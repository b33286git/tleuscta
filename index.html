    this.heating = false;
    this.cooling = false;
    this.coolProgress = 0;
  }
  layout() {
    this.baseLayout();
    const W = Game.width, H = Game.height;
    this.bossX = W * 0.65;
    this.bossY = H * 0.35;
    // 道具列
    const layoutItems = (items) => {
      const itemY = H - 80;
      const totalW = Math.min(W * 0.75, 480);
      const startX = (W - totalW) / 2;
      const step = totalW / (items.length - 1);
      items.forEach((it, i) => { it.x = startX + i * step; it.y = itemY; it.r = 36; });
    };
    layoutItems(this.p1Items);
    layoutItems(this.p2Items);
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  showPhaseHint(text) {
    this.phaseHint = text;
    this.phaseHintTimer = 3.0;
  }
  onEnter() {
    this.showPhaseHint('🐲 烈焰魔王來襲！\n他被火盾包住，想想之前學過什麼能破解');
  }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    if (this.bossDying) return;

    if (this.bossPhase === 1) {
      for (const it of this.p1Items) {
        if (it.used) continue;
        const dx = x - it.x, dy = y - it.y;
        if (dx*dx + dy*dy < it.r*it.r) {
          if (it.correct) {
            it.used = true;
            this.damageBoss();
            this.showFeedback('💧 水蓋過火盾！魔王受傷', '#4fc3f7');
            setTimeout(() => {
              this.bossPhase = 2;
              this.showPhaseHint('🐲 第 2 階段：他開始噴火咆哮！\n單一道具不夠，要照順序兩步驟才能封住');
            }, 1200);
          } else {
            this.showFeedback('❌ 沒用！火盾沒破，再想想', '#ff7043');
          }
          return;
        }
      }
    }
    else if (this.bossPhase === 2) {
      for (const it of this.p2Items) {
        if (it.used) continue;
        const dx = x - it.x, dy = y - it.y;
        if (dx*dx + dy*dy < it.r*it.r) {
          if (this.p2Step === 1 && it.id === 'ice') {
            it.used = true;
            this.p2Step = 2;
            this.showFeedback('❄️ 火變弱了！再吹熄它', '#4fc3f7');
          } else if (this.p2Step === 2 && it.id === 'wind') {
            it.used = true;
            this.damageBoss();
            this.showFeedback('🌬️ 風吹熄殘火！魔王再受重創', '#81c784');
            setTimeout(() => {
              this.bossPhase = 3;
              this.bossHeat = 30;
              this.showPhaseHint('🐲 最終階段：魔王體溫失控\n讓他穩定在綠色區域才能徹底制服他');
            }, 1200);
          } else {
            this.showFeedback('❌ 順序錯了！想想步驟', '#ff7043');
          }
          return;
        }
      }
    }
    else if (this.bossPhase === 3) {
      const W = Game.width, H = Game.height;
      const btnY = H - 80;
      const btnHeat = { x: W*0.35, y: btnY, r: 42 };
      const btnCool = { x: W*0.65, y: btnY, r: 42 };
      const dh = x - btnHeat.x, dh2 = y - btnHeat.y;
      const dc = x - btnCool.x, dc2 = y - btnCool.y;
      if (dh*dh + dh2*dh2 < btnHeat.r*btnHeat.r) { this.heating = true; this.cooling = false; }
      else if (dc*dc + dc2*dc2 < btnCool.r*btnCool.r) { this.cooling = true; this.heating = false; }
      else { this.heating = false; this.cooling = false; }
    }
  }
  damageBoss() {
    this.bossHP--;
    this.flashTime = 0.4;
    if (this.bossHP <= 0) {
      this.bossDying = true;
      this.bossDieTime = this.time;
      this.showFeedback('🎊 烈焰魔王被打敗了！', '#ffd700');
      setTimeout(() => this.startWalk(), 2200);
    }
  }
  update(dt) {
    this.baseUpdate(dt);
    if (this.flashTime > 0) this.flashTime -= dt;
    if (this.phaseHintTimer > 0) this.phaseHintTimer -= dt;

    // P3：溫度控制
    if (this.bossPhase === 3 && !this.bossDying) {
      if (this.heating) this.bossHeat = Math.min(100, this.bossHeat + 30 * dt);
      else if (this.cooling) this.bossHeat = Math.max(0, this.bossHeat - 30 * dt);
      else this.bossHeat += (60 - this.bossHeat) * dt * 0.4;

      // 在綠區（40~60）累積冷卻進度
      if (this.bossHeat >= 40 && this.bossHeat <= 60) {
        this.coolProgress += dt * 25;
        if (this.coolProgress >= 100) {
          this.coolProgress = 100;
          this.damageBoss();
        }
      } else {
        this.coolProgress = Math.max(0, this.coolProgress - dt * 10);
      }
    }

    // boss 偶爾出招（裝飾火球）
    this.attackCooldown -= dt;
    if (this.attackCooldown <= 0 && !this.bossDying) {
      this.attackCooldown = 1.5 + Math.random();
      this.fireballs.push({
        x: this.bossX, y: this.bossY,
        vx: -100 - Math.random()*60, vy: -50 + Math.random()*100,
        life: 0,
      });
    }
    for (const fb of this.fireballs) {
      fb.life += dt;
      fb.x += fb.vx * dt;
      fb.y += fb.vy * dt;
      fb.vy += 80 * dt;
    }
    this.fireballs = this.fireballs.filter(f => f.life < 1.5 && f.y < Game.height);
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 魔王
    if (!this.bossDying || this.time - this.bossDieTime < 2) {
      this.drawBoss(ctx);
    }

    // boss 火球攻擊
    for (const fb of this.fireballs) {
      const grad = ctx.createRadialGradient(fb.x-3, fb.y-3, 0, fb.x, fb.y, 12);
      grad.addColorStop(0, '#ffeb3b'); grad.addColorStop(1, '#ff5722');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(fb.x, fb.y, 10, 0, Math.PI*2); ctx.fill();
    }

    // BOSS HP 條
    if (!this.bossDying) {
      const barW = 240, barH = 14;
      const bx = W/2 - barW/2, by = 100;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bx, by, barW, barH);
      ctx.fillStyle = '#e53935';
      ctx.fillRect(bx, by, barW * (this.bossHP/this.bossMaxHP), barH);
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, barW, barH);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 11px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText(`烈焰魔王 ❤️ ${this.bossHP}/${this.bossMaxHP}`, W/2, by - 4);
    }

    // 階段提示橫幅
    if (this.phaseHintTimer > 0 && this.phaseHint) {
      const a = Math.min(1, this.phaseHintTimer / 0.4);
      ctx.save(); ctx.globalAlpha = a;
      ctx.fillStyle = 'rgba(74, 20, 140, 0.92)';
      const lines = this.phaseHint.split('\n');
      const bh = 30 + lines.length * 22;
      ctx.fillRect(0, H/2 - bh/2, W, bh);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 16px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      lines.forEach((line, i) => {
        ctx.fillStyle = i === 0 ? '#ffd700' : '#fff';
        ctx.font = i === 0 ? 'bold 18px -apple-system, "PingFang TC"' : '14px -apple-system, "PingFang TC"';
        ctx.fillText(line, W/2, H/2 - bh/2 + 25 + i * 22);
      });
      ctx.restore();
    }

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);

    // 階段對應 UI
    if (!this.bossDying) {
      if (this.bossPhase === 1) this.drawP1UI(ctx);
      else if (this.bossPhase === 2) this.drawP2UI(ctx);
      else if (this.bossPhase === 3) this.drawP3UI(ctx);
    }

    // 標題
    this.drawHeader(ctx, '🐲 火之大陸 — 烈焰魔王', `階段 ${this.bossPhase}/3`);
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 你打敗了魔王！', [
        '這場戰鬥用到了所有你學的技巧：',
        '🧠 第 1 階段 → 因果推理（水滅火）',
        '🧠 第 2 階段 → 順序步驟（冰再風）',
        '🧠 第 3 階段 → 平衡控制（剛剛好）',
        '',
        '✨ 真正的高手不只記答案',
        '✨ 是會把學會的道理組合起來用',
        '',
        '🎊 火之大陸冒險結束！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '🎊 火之大陸通關！');
    this.drawEnterFade(ctx);
  }
  drawBoss(ctx) {
    const bx = this.bossX, by = this.bossY;
    const time = this.time;
    let dyingScale = 1;
    let dyingAlpha = 1;
    if (this.bossDying) {
      const t = time - this.bossDieTime;
      dyingScale = 1 + t * 0.3;
      dyingAlpha = Math.max(0, 1 - t / 2);
    }
    const flash = Math.max(0, this.flashTime / 0.4);
    ctx.save();
    ctx.globalAlpha = dyingAlpha;
    ctx.translate(bx, by);
    ctx.scale(dyingScale, dyingScale);
    const bob = Math.sin(time * 2) * 5;
    ctx.translate(0, bob);

    // 火盾（階段 1）
    if (this.bossPhase === 1 && !this.bossDying) {
      const sr = 80 + Math.sin(time*3) * 8;
      ctx.fillStyle = `rgba(255, 87, 34, ${0.3+Math.sin(time*4)*0.2})`;
      ctx.beginPath(); ctx.arc(0, 0, sr, 0, Math.PI*2); ctx.fill();
      // 火盾紋
      ctx.strokeStyle = `rgba(255, 215, 0, 0.8)`;
      ctx.lineWidth = 2;
      for (let k = 0; k < 8; k++) {
        const ang = time * 0.3 + k * Math.PI / 4;
        ctx.beginPath();
        ctx.arc(0, 0, sr - 4, ang, ang + 0.3);
        ctx.stroke();
      }
    }

    // 龍身（紫黑色）
    const bodyColor = flash > 0 ? '#fff' : '#3a0a3a';
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.ellipse(0, 0, 50, 40, 0, 0, Math.PI*2);
    ctx.fill();
    // 翅膀
    ctx.fillStyle = flash > 0 ? '#fff' : '#7b1fa2';
    ctx.beginPath();
    ctx.ellipse(-50, -10, 30, 20, -0.5 + Math.sin(time*3)*0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(50, -10, 30, 20, 0.5 - Math.sin(time*3)*0.2, 0, Math.PI*2);
    ctx.fill();
    // 眼睛（紅）
    ctx.fillStyle = flash > 0 ? '#fff' : '#ff1744';
    ctx.beginPath(); ctx.arc(-15, -8, 7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, -8, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-15, -8, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, -8, 3, 0, Math.PI*2); ctx.fill();
    // 嘴
    ctx.fillStyle = '#7f0000';
    ctx.beginPath();
    ctx.ellipse(0, 12, 18, 8, 0, 0, Math.PI);
    ctx.fill();
    // 牙
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-8, 12); ctx.lineTo(-5, 20); ctx.lineTo(-2, 12);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, 12); ctx.lineTo(5, 20); ctx.lineTo(8, 12);
    ctx.closePath(); ctx.fill();
    // 角
    ctx.fillStyle = flash > 0 ? '#fff' : '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-20, -30); ctx.lineTo(-15, -50); ctx.lineTo(-10, -30);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(20, -30); ctx.lineTo(15, -50); ctx.lineTo(10, -30);
    ctx.closePath(); ctx.fill();

    ctx.restore();
  }
  drawP1UI(ctx) { this.drawItemRow(ctx, this.p1Items); }
  drawP2UI(ctx) {
    this.drawItemRow(ctx, this.p2Items);
    // 步驟提示
    const W = Game.width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 90, 130, 180, 22);
    ctx.fillStyle = this.p2Step === 1 ? '#4fc3f7' : '#81c784';
    ctx.font = 'bold 13px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(`步驟 ${this.p2Step}/2：` + (this.p2Step === 1 ? '先讓火變弱' : '把殘火吹熄'), W/2, 145);
  }
  drawP3UI(ctx) {
    const W = Game.width, H = Game.height;

    // 進度條
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 80, 130, 160, 14);
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(W/2 - 80, 130, 160 * (this.coolProgress/100), 14);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(W/2 - 80, 130, 160, 14);
    ctx.fillStyle = '#fff';
    ctx.font = '11px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('冷卻中...', W/2, 126);

    // 溫度計
    const tcX = W * 0.85;
    const tcY = H * 0.5;
    const tcH = 200;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(tcX - 18, tcY - tcH/2, 36, tcH);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(tcX - 18, tcY - tcH/2, 36, tcH);
    const minY = tcY + tcH/2 - tcH * 0.4;
    const maxY = tcY + tcH/2 - tcH * 0.6;
    ctx.fillStyle = 'rgba(76, 175, 80, 0.4)';
    ctx.fillRect(tcX - 18, maxY, 36, minY - maxY);
    const heatY = tcY + tcH/2 - tcH * (this.bossHeat/100);
    let heatColor = '#ffd700';
    if (this.bossHeat > 60) heatColor = '#ff5252';
    else if (this.bossHeat < 40) heatColor = '#4fc3f7';
    else heatColor = '#4caf50';
    ctx.fillStyle = heatColor;
    ctx.fillRect(tcX - 14, heatY, 28, tcY + tcH/2 - heatY);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.floor(this.bossHeat)}°`, tcX, heatY - 6);
    ctx.fillStyle = '#4caf50';
    ctx.fillText('剛好', tcX + 28, (minY + maxY)/2 + 4);

    // 按鈕
    const btnY = H - 80;
    [
      { x: W*0.35, label: '🔥 加熱', color: '#ff5722', active: this.heating },
      { x: W*0.65, label: '❄️ 降溫', color: '#03a9f4', active: this.cooling },
    ].forEach(btn => {
      ctx.fillStyle = btn.active ? btn.color : 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(btn.x, btnY, 42, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = btn.color; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(btn.label, btn.x, btnY);
      ctx.textBaseline = 'alphabetic';
    });
  }
  drawItemRow(ctx, items) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, H-110, W, 110);
    for (const it of items) {
      const wobble = it.used ? 0 : Math.sin(this.time*2 + it.x*0.01) * 2;
      ctx.fillStyle = it.used ? 'rgba(50,50,50,0.4)' : 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(it.x, it.y + wobble, it.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = it.used ? 'rgba(100,100,100,0.3)' : 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 2; ctx.stroke();
      ctx.font = '32px -apple-system';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = it.used ? 0.3 : 1;
      ctx.fillText(it.icon, it.x, it.y + wobble);
      ctx.globalAlpha = 1;
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = it.used ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.85)';
      ctx.font = '12px -apple-system, "PingFang TC"';
      ctx.fillText(it.name, it.x, it.y + it.r + 16 + wobble);
    }
  }
}

/* ============================================================
   💧 水之大陸地圖（關卡選擇）
   ============================================================ */
class WaterMapScene {
  constructor() {
    this.name = 'WaterMap';
    this.time = 0;
    this.bubbles = [];
    this.cat = null;
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);
    this.backBtn = { x: 50, y: 30, r: 22 };
    this.levels = [];
  }
  enter() {
    this.layout();
    this.cat = new PixelCat(Game.width * 0.5, Game.height * 0.85);
    this.cat.scale = 2;
    for (let i = 0; i < 30; i++) {
      this.bubbles.push({
        x: Math.random()*Game.width,
        y: Math.random()*Game.height + Game.height,
        vy: -20-Math.random()*40,
        size: 2+Math.random()*5,
        life: Math.random(),
      });
    }
  }
  onResize() { this.layout(); }
  layout() {
    const W = Game.width, H = Game.height;
    const lv = Game.progress.waterLevel || 0;
    this.levels = [
      { num: 1, name: '閘門順序', x: W*0.25, y: H*0.55, cleared: lv>=1, unlocked: true,    r: 36 },
      { num: 2, name: '?', x: W*0.42, y: H*0.42, cleared: lv>=2, unlocked: lv>=1, r: 36, locked: lv<1 },
      { num: 3, name: '?', x: W*0.58, y: H*0.55, cleared: lv>=3, unlocked: lv>=2, r: 36, locked: lv<2 },
      { num: 4, name: '?', x: W*0.75, y: H*0.42, cleared: lv>=4, unlocked: lv>=3, r: 36, locked: lv<3 },
    ];
  }
  onTap(x, y) {
    const bx = x - this.backBtn.x, by = y - this.backBtn.y;
    if (bx*bx + by*by < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new WorldMapScene()); return;
    }
    for (const lv of this.levels) {
      if (!lv.unlocked) continue;
      const dx = x - lv.x, dy = y - lv.y;
      if (dx*dx + dy*dy < lv.r*lv.r) {
        if (lv.num === 1) Game.changeScene(new WaterLevel1Scene());
        return;
      }
    }
  }
  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);
    for (const b of this.bubbles) {
      b.y += b.vy * dt;
      if (b.y < -20) {
        b.y = Game.height + 20;
        b.x = Math.random() * Game.width;
      }
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    // 海底漸層
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a3a6a'); sky.addColorStop(0.5, '#1565c0');
    sky.addColorStop(0.9, '#0a4a8a'); sky.addColorStop(1, '#062040');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // 光線從上往下（散射光）
    for (let i = 0; i < 5; i++) {
      const lx = (i + 0.5) * W / 5 + Math.sin(this.time*0.5 + i) * 30;
      const grad = ctx.createLinearGradient(lx, 0, lx, H*0.6);
      grad.addColorStop(0, 'rgba(180,220,255,0.15)');
      grad.addColorStop(1, 'rgba(180,220,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(lx - 50, 0); ctx.lineTo(lx + 50, 0);
      ctx.lineTo(lx + 100, H*0.6); ctx.lineTo(lx - 100, H*0.6);
      ctx.closePath(); ctx.fill();
    }

    // 遠方珊瑚剪影
    ctx.fillStyle = '#062a4a';
    for (let i = 0; i < 6; i++) {
      const cx = W * (i+0.5) / 6;
      const ch = 60 + Math.sin(i*1.7) * 20;
      ctx.beginPath();
      ctx.moveTo(cx-30, H*0.7);
      ctx.quadraticCurveTo(cx-25, H*0.7-ch*0.7, cx-15, H*0.7-ch);
      ctx.quadraticCurveTo(cx, H*0.7-ch*1.2, cx+15, H*0.7-ch);
      ctx.quadraticCurveTo(cx+25, H*0.7-ch*0.7, cx+30, H*0.7);
      ctx.closePath(); ctx.fill();
    }

    // 海底地面
    const gd = ctx.createLinearGradient(0, H*0.7, 0, H);
    gd.addColorStop(0, '#0d4a8a'); gd.addColorStop(1, '#062040');
    ctx.fillStyle = gd;
    ctx.fillRect(0, H*0.7, W, H*0.3);

    // 路徑
    ctx.strokeStyle = 'rgba(150,220,255,0.4)';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(this.cat.x, this.cat.y - 30);
    for (let i = 0; i < this.levels.length; i++) {
      const lv = this.levels[i];
      if (i === 0) ctx.lineTo(lv.x, lv.y);
      else {
        const prev = this.levels[i-1];
        const mx = (prev.x + lv.x) / 2;
        const my = (prev.y + lv.y) / 2 + (i % 2 === 0 ? 30 : -30);
        ctx.quadraticCurveTo(mx, my, lv.x, lv.y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 關卡圖示
    for (const lv of this.levels) {
      const bob = Math.sin(this.time*2 + lv.num) * 4;
      const cy = lv.y + bob;
      if (lv.unlocked && !lv.cleared) {
        ctx.fillStyle = `rgba(100,200,255,${0.25+Math.sin(this.time*3+lv.num)*0.2})`;
        ctx.beginPath(); ctx.arc(lv.x, cy, lv.r+18, 0, Math.PI*2); ctx.fill();
      }
      const grad = ctx.createRadialGradient(lv.x, cy, 0, lv.x, cy, lv.r);
      if (lv.cleared) { grad.addColorStop(0, '#ffd700'); grad.addColorStop(1, '#b8860b'); }
      else if (lv.unlocked) { grad.addColorStop(0, '#03a9f4'); grad.addColorStop(1, '#01579b'); }
      else { grad.addColorStop(0, '#1a3a5a'); grad.addColorStop(1, '#0a1a2a'); }
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(lv.x, cy, lv.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = lv.cleared ? '#fff8d0' : (lv.unlocked ? '#81d4fa' : '#3a4a5a');
      ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = lv.unlocked ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 28px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lv.unlocked ? `${lv.num}` : '🔒', lv.x, cy);
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = lv.unlocked ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      ctx.font = '13px -apple-system, "PingFang TC"';
      ctx.fillText(lv.name, lv.x, cy + lv.r + 22);
      if (lv.cleared) {
        ctx.fillStyle = '#4caf50';
        ctx.beginPath(); ctx.arc(lv.x+lv.r-8, cy-lv.r+8, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system';
        ctx.textBaseline = 'middle';
        ctx.fillText('✓', lv.x+lv.r-8, cy-lv.r+9);
        ctx.textBaseline = 'alphabetic';
      }
    }

    if (this.cat) this.cat.draw(ctx);

    // 氣泡
    for (const b of this.bubbles) {
      ctx.fillStyle = `rgba(180,220,255,${0.3+b.life*0.4})`;
      ctx.beginPath(); ctx.arc(b.x + Math.sin(this.time*2+b.life*10)*5, b.y, b.size, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 0.5; ctx.stroke();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 110, 16, 220, 36);
    ctx.fillStyle = '#81d4fa';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('💧 水之大陸 — 選擇關卡', W/2, 40);
    const lv = Game.progress.waterLevel || 0;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px -apple-system, "PingFang TC"';
    ctx.fillText(`進度：${lv} / 4 關（V1 僅開放第 1 關）`, W/2, 70);

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ============================================================
   💧 水之大陸第 1 關：閘門順序（順序步驟解謎）
   說明：山頂的水源要引到山下村莊，路上有 3 個閘門。
        依水路圖看出正確順序，依序點擊閘門 → 水成功流到村莊。
   ============================================================ */
class WaterLevel1Scene extends FireLevelBase {
  constructor() {
    super(1);
    this.name = 'Water L1';
    this.continent = 'water';
    this.mapSceneClass = WaterMapScene;
    this.gates = [];
    // 正解順序：先 B，再 A，最後 C（看水流路徑就知道）
    this.correctOrder = ['B', 'A', 'C'];
    this.currentStep = 0;
    this.bubbles = [];
    this.waterAnim = 0;        // 水流推進進度
    this.flowingTo = -1;       // 0,1,2,3 代表水流到第幾段
  }
  layout() {
    this.baseLayout();
    const W = Game.width, H = Game.height;
    // 水路：從左上山頂 → 經過閘門 B → 閘門 A → 閘門 C → 右下村莊
    // 但閘門擺位置要刻意打散（不依字母 ABC 順序排）
    this.gates = [
      { id: 'A', x: W*0.45, y: H*0.45, opened: false, label: 'A' },
      { id: 'B', x: W*0.30, y: H*0.30, opened: false, label: 'B' },
      { id: 'C', x: W*0.65, y: H*0.55, opened: false, label: 'C' },
    ];
    this.sourceX = W*0.12; this.sourceY = H*0.22;
    this.villageX = W*0.85; this.villageY = H*0.72;
    // 水路 path（B → A → C）
    this.path = [
      { x: this.sourceX, y: this.sourceY },
      { x: W*0.20, y: H*0.30 },
      { x: this.gates[1].x, y: this.gates[1].y },  // B
      { x: W*0.38, y: H*0.42 },
      { x: this.gates[0].x, y: this.gates[0].y },  // A
      { x: W*0.55, y: H*0.55 },
      { x: this.gates[2].x, y: this.gates[2].y },  // C
      { x: W*0.78, y: H*0.65 },
      { x: this.villageX, y: this.villageY },
    ];
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onEnter() {
    for (let i = 0; i < 20; i++) {
      this.bubbles.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height,
        vy: -10-Math.random()*20, size: 2+Math.random()*4,
        life: Math.random(),
      });
    }
  }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    for (const g of this.gates) {
      if (g.opened) continue;
      const dx = x - g.x, dy = y - g.y;
      if (dx*dx + dy*dy < 38*38) {
        const expected = this.correctOrder[this.currentStep];
        if (g.id === expected) {
          g.opened = true;
          this.currentStep++;
          this.flowingTo = this.currentStep;
          this.showFeedback(`✨ 對了！水流到 ${g.label} 閘門 (${this.currentStep}/3)`, '#81d4fa');
          if (this.currentStep >= 3) {
            // 過關
            setTimeout(() => this.startWalk(this.villageX), 1500);
          }
        } else {
          // 答錯：水溢出，所有閘門關閉重來
          this.showFeedback('💦 水溢出來了！順序錯了，全部重來', '#ff7043');
          for (const gg of this.gates) gg.opened = false;
          this.currentStep = 0;
          this.flowingTo = -1;
          this.waterAnim = 0;
        }
        return;
      }
    }
  }
  update(dt) {
    this.baseUpdate(dt);
    // 水流推進動畫
    if (this.flowingTo > 0) {
      const target = this.flowingTo / 3;
      this.waterAnim += (target - this.waterAnim) * dt * 4;
    }
    for (const b of this.bubbles) {
      b.y += b.vy * dt;
      if (b.y < 0) { b.y = Game.height; b.x = Math.random()*Game.width; }
    }
  }
  drawBackground(ctx) {
    const W = Game.width, H = Game.height;
    // 海底漸層
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a3a6a'); sky.addColorStop(0.5, '#1976d2');
    sky.addColorStop(1, '#0d4a8a');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    // 光線
    for (let i = 0; i < 4; i++) {
      const lx = (i + 0.5) * W / 4 + Math.sin(this.time*0.5 + i) * 20;
      const grad = ctx.createLinearGradient(lx, 0, lx, H);
      grad.addColorStop(0, 'rgba(180,220,255,0.12)');
      grad.addColorStop(1, 'rgba(180,220,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(lx - 40, 0); ctx.lineTo(lx + 40, 0);
      ctx.lineTo(lx + 80, H); ctx.lineTo(lx - 80, H);
      ctx.closePath(); ctx.fill();
    }
    // 地面
    const gd = ctx.createLinearGradient(0, this.groundY, 0, H);
    gd.addColorStop(0, '#0d4a8a'); gd.addColorStop(1, '#062040');
    ctx.fillStyle = gd;
    ctx.fillRect(0, this.groundY, W, H - this.groundY);
  }
  drawForeground(ctx) {
    // 氣泡
    for (const b of this.bubbles) {
      ctx.fillStyle = `rgba(180,220,255,${0.3+b.life*0.3})`;
      ctx.beginPath();
      ctx.arc(b.x + Math.sin(this.time*2+b.life*10)*4, b.y, b.size, 0, Math.PI*2);
      ctx.fill();
    }
    // 慶祝粒子
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color; ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 水源（山頂的湧泉）
    ctx.fillStyle = '#3a5a7a';
    ctx.beginPath();
    ctx.arc(this.sourceX, this.sourceY, 28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4fc3f7';
    ctx.beginPath();
    ctx.arc(this.sourceX, this.sourceY, 18, 0, Math.PI*2); ctx.fill();
    // 水源閃爍
    ctx.fillStyle = `rgba(255,255,255,${0.3+Math.sin(this.time*4)*0.2})`;
    ctx.beginPath();
    ctx.arc(this.sourceX-5, this.sourceY-5, 6, 0, Math.PI*2); ctx.fill();
    // 水源標籤
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('💧 水源', this.sourceX, this.sourceY - 36);

    // 村莊（目的地）
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(this.villageX-25, this.villageY-15, 50, 30);
    ctx.fillStyle = '#8b4513';
    ctx.beginPath();
    ctx.moveTo(this.villageX-30, this.villageY-15);
    ctx.lineTo(this.villageX, this.villageY-35);
    ctx.lineTo(this.villageX+30, this.villageY-15);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(this.villageX-6, this.villageY-5, 12, 18);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px -apple-system, "PingFang TC"';
    ctx.fillText('🏘️ 村莊', this.villageX, this.villageY + 30);

    // 水路（虛線管道，未流的部分）
    ctx.strokeStyle = 'rgba(150,200,230,0.4)';
    ctx.lineWidth = 8;
    ctx.setLineDash([10, 6]);
    ctx.beginPath();
    ctx.moveTo(this.path[0].x, this.path[0].y);
    for (let i = 1; i < this.path.length; i++) {
      ctx.lineTo(this.path[i].x, this.path[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 已通水的水路（藍色實線 + 流動感）
    if (this.waterAnim > 0) {
      ctx.strokeStyle = '#4fc3f7';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      // 計算當前已流到的位置
      const segments = this.path.length - 1;
      const totalProgress = this.waterAnim * segments;
      ctx.beginPath();
      ctx.moveTo(this.path[0].x, this.path[0].y);
      let drawn = 0;
      for (let i = 1; i < this.path.length && drawn < totalProgress; i++) {
        if (drawn + 1 <= totalProgress) {
          ctx.lineTo(this.path[i].x, this.path[i].y);
          drawn++;
        } else {
          // 部分線段
          const t = totalProgress - drawn;
          const px = this.path[i-1].x + (this.path[i].x - this.path[i-1].x) * t;
          const py = this.path[i-1].y + (this.path[i].y - this.path[i-1].y) * t;
          ctx.lineTo(px, py);
          drawn = totalProgress;
        }
      }
      ctx.stroke();
      // 水波亮點
      ctx.strokeStyle = `rgba(255,255,255,${0.4+Math.sin(this.time*8)*0.3})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(this.path[0].x, this.path[0].y);
      let drawn2 = 0;
      for (let i = 1; i < this.path.length && drawn2 < totalProgress; i++) {
        if (drawn2 + 1 <= totalProgress) {
          ctx.lineTo(this.path[i].x, this.path[i].y);
          drawn2++;
        } else {
          const t = totalProgress - drawn2;
          const px = this.path[i-1].x + (this.path[i].x - this.path[i-1].x) * t;
          const py = this.path[i-1].y + (this.path[i].y - this.path[i-1].y) * t;
          ctx.lineTo(px, py);
          drawn2 = totalProgress;
        }
      }
      ctx.stroke();
      ctx.lineCap = 'butt';
    }

    // 閘門
    for (const g of this.gates) {
      const isNext = !g.opened && g.id === this.correctOrder[this.currentStep];
      const pulse = isNext ? 1 + Math.sin(this.time*4)*0.1 : 1;
      // 底座
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(g.x - 30*pulse, g.y - 4, 60*pulse, 8);
      // 閘門板
      const gateColor = g.opened ? '#4caf50' : '#90a4ae';
      ctx.fillStyle = gateColor;
      const gateH = g.opened ? 20 : 50;
      ctx.fillRect(g.x - 18*pulse, g.y - gateH, 36*pulse, gateH);
      // 邊框
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(g.x - 18*pulse, g.y - gateH, 36*pulse, gateH);
      // 字母
      ctx.fillStyle = g.opened ? '#fff' : '#1a1a1a';
      ctx.font = 'bold 22px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(g.label, g.x, g.y - gateH/2);
      ctx.textBaseline = 'alphabetic';
      // 已開啟標記
      if (g.opened) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system';
        ctx.textBaseline = 'middle';
        ctx.fillText('✓', g.x, g.y - gateH - 14);
        ctx.textBaseline = 'alphabetic';
      }
    }

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);
    this.drawHeader(ctx, '💧 水之大陸 — 第 1 關 閘門順序',
      `看水流方向找出開閘順序 (${this.currentStep}/3)`);
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 順序步驟', [
        '想要水成功流到村莊，',
        '必須照「水流的順序」開閘門：',
        '',
        '🌊 水從高處流到低處',
        '🚪 水流到哪個閘門才能開哪個',
        '',
        '✨ 這就是「程式設計」的基本思維：',
        '一步一步來，順序不能錯！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '水流到村莊了！');
    this.drawEnterFade(ctx);
  }
}

/* ============================================================
   🌿 森林大陸地圖
   ============================================================ */
class ForestMapScene {
  constructor() {
    this.name = 'ForestMap';
    this.time = 0;
    this.leaves = [];
    this.cat = null;
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);
    this.backBtn = { x: 50, y: 30, r: 22 };
    this.levels = [];
  }
  enter() {
    this.layout();
    this.cat = new PixelCat(Game.width * 0.5, Game.height * 0.85);
    this.cat.scale = 2;
    for (let i = 0; i < 25; i++) {
      this.leaves.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height,
        vx: -10-Math.random()*15, vy: 10+Math.random()*20,
        size: 3+Math.random()*4, rot: Math.random()*Math.PI*2,
        color: ['#4caf50','#81c784','#a5d6a7','#ffeb3b','#ffa726'][Math.floor(Math.random()*5)],
      });
    }
  }
  onResize() { this.layout(); }
  layout() {
    const W = Game.width, H = Game.height;
    const lv = Game.progress.forestLevel || 0;
    this.levels = [
      { num: 1, name: '果實分類', x: W*0.25, y: H*0.55, cleared: lv>=1, unlocked: true,    r: 36 },
      { num: 2, name: '?', x: W*0.42, y: H*0.42, cleared: lv>=2, unlocked: lv>=1, r: 36 },
      { num: 3, name: '?', x: W*0.58, y: H*0.55, cleared: lv>=3, unlocked: lv>=2, r: 36 },
      { num: 4, name: '?', x: W*0.75, y: H*0.42, cleared: lv>=4, unlocked: lv>=3, r: 36 },
    ];
  }
  onTap(x, y) {
    const bx = x - this.backBtn.x, by = y - this.backBtn.y;
    if (bx*bx + by*by < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new WorldMapScene()); return;
    }
    for (const lv of this.levels) {
      if (!lv.unlocked) continue;
      const dx = x - lv.x, dy = y - lv.y;
      if (dx*dx + dy*dy < lv.r*lv.r) {
        if (lv.num === 1) Game.changeScene(new ForestLevel1Scene());
        return;
      }
    }
  }
  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);
    for (const l of this.leaves) {
      l.x += l.vx * dt;
      l.y += l.vy * dt;
      l.rot += dt * 2;
      if (l.x < -20 || l.y > Game.height + 20) {
        l.x = Game.width + 20; l.y = -20;
      }
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    // 森林漸層
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1b5e20'); sky.addColorStop(0.4, '#2e7d32');
    sky.addColorStop(0.8, '#388e3c'); sky.addColorStop(1, '#1b5e20');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // 樹木剪影（深色背景樹）
    ctx.fillStyle = '#0d3a10';
    for (let i = 0; i < 8; i++) {
      const tx = W * (i+0.5) / 8 + Math.sin(i*1.7) * 30;
      const th = 100 + Math.sin(i*2.3) * 30;
      // 樹幹
      ctx.fillRect(tx-6, H*0.5, 12, H*0.2);
      // 樹冠
      ctx.beginPath();
      ctx.arc(tx, H*0.5 - th*0.3, th*0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(tx-th*0.3, H*0.5 - th*0.1, th*0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(tx+th*0.3, H*0.5 - th*0.1, th*0.4, 0, Math.PI*2); ctx.fill();
    }

    // 地面（深綠色）
    const gd = ctx.createLinearGradient(0, H*0.7, 0, H);
    gd.addColorStop(0, '#2e5b1f'); gd.addColorStop(1, '#1a3a10');
    ctx.fillStyle = gd;
    ctx.fillRect(0, H*0.7, W, H*0.3);
    // 草點裝飾
    ctx.fillStyle = '#4caf50';
    for (let i = 0; i < 30; i++) {
      const gx = (i * 47) % W;
      const gy = H*0.7 + (i*23) % (H*0.3 - 5);
      ctx.fillRect(gx, gy, 2, 5);
    }

    // 路徑
    ctx.strokeStyle = 'rgba(200,255,150,0.4)';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(this.cat.x, this.cat.y - 30);
    for (let i = 0; i < this.levels.length; i++) {
      const lv = this.levels[i];
      if (i === 0) ctx.lineTo(lv.x, lv.y);
      else {
        const prev = this.levels[i-1];
        const mx = (prev.x + lv.x) / 2;
        const my = (prev.y + lv.y) / 2 + (i % 2 === 0 ? 30 : -30);
        ctx.quadraticCurveTo(mx, my, lv.x, lv.y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 關卡圖示
    for (const lv of this.levels) {
      const bob = Math.sin(this.time*2 + lv.num) * 4;
      const cy = lv.y + bob;
      if (lv.unlocked && !lv.cleared) {
        ctx.fillStyle = `rgba(150,255,100,${0.25+Math.sin(this.time*3+lv.num)*0.2})`;
        ctx.beginPath(); ctx.arc(lv.x, cy, lv.r+18, 0, Math.PI*2); ctx.fill();
      }
      const grad = ctx.createRadialGradient(lv.x, cy, 0, lv.x, cy, lv.r);
      if (lv.cleared) { grad.addColorStop(0, '#ffd700'); grad.addColorStop(1, '#b8860b'); }
      else if (lv.unlocked) { grad.addColorStop(0, '#66bb6a'); grad.addColorStop(1, '#1b5e20'); }
      else { grad.addColorStop(0, '#1a3a10'); grad.addColorStop(1, '#0a1a05'); }
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(lv.x, cy, lv.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = lv.cleared ? '#fff8d0' : (lv.unlocked ? '#a5d6a7' : '#3a4a3a');
      ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = lv.unlocked ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 28px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lv.unlocked ? `${lv.num}` : '🔒', lv.x, cy);
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = lv.unlocked ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      ctx.font = '13px -apple-system, "PingFang TC"';
      ctx.fillText(lv.name, lv.x, cy + lv.r + 22);
      if (lv.cleared) {
        ctx.fillStyle = '#4caf50';
        ctx.beginPath(); ctx.arc(lv.x+lv.r-8, cy-lv.r+8, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system'; ctx.textBaseline = 'middle';
        ctx.fillText('✓', lv.x+lv.r-8, cy-lv.r+9);
        ctx.textBaseline = 'alphabetic';
      }
    }

    if (this.cat) this.cat.draw(ctx);

    // 飄落葉子
    for (const l of this.leaves) {
      ctx.save();
      ctx.translate(l.x, l.y);
      ctx.rotate(l.rot);
      ctx.fillStyle = l.color;
      ctx.fillRect(-l.size, -l.size*0.5, l.size*2, l.size);
      ctx.restore();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 110, 16, 220, 36);
    ctx.fillStyle = '#a5d6a7';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('🌿 森林大陸 — 選擇關卡', W/2, 40);
    const lv = Game.progress.forestLevel || 0;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px -apple-system, "PingFang TC"';
    ctx.fillText(`進度：${lv} / 4 關（V1 僅開放第 1 關）`, W/2, 70);

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ============================================================
   🌿 森林大陸第 1 關：果實分類（多重條件分類）
   說明：6 顆果實要按「顏色 + 形狀」雙條件分到 4 個籃子
        例：紅色+圓形 → 籃子 1，藍色+方形 → 籃子 4
   ============================================================ */
class ForestLevel1Scene extends FireLevelBase {
  constructor() {
    super(1);
    this.name = 'Forest L1';
    this.continent = 'forest';
    this.mapSceneClass = ForestMapScene;
    // 6 顆果實：刻意打散順序
    // 顏色：red/blue, 形狀：round/square
    this.fruits = [
      { id: 0, color:'red',  shape:'round',  placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
      { id: 1, color:'blue', shape:'square', placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
      { id: 2, color:'red',  shape:'square', placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
      { id: 3, color:'blue', shape:'round',  placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
      { id: 4, color:'red',  shape:'round',  placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
      { id: 5, color:'blue', shape:'square', placed: null, x: 0, y: 0, baseX: 0, baseY: 0 },
    ];
    // 4 個籃子（順序刻意打散，避免直覺從左到右）
    this.baskets = [
      { id: 0, color:'blue', shape:'square', x: 0, y: 0 },
      { id: 1, color:'red',  shape:'round',  x: 0, y: 0 },
      { id: 2, color:'blue', shape:'round',  x: 0, y: 0 },
      { id: 3, color:'red',  shape:'square', x: 0, y: 0 },
    ];
    this.selectedFruit = null;
    this.placedCount = 0;
  }
  layout() {
    this.baseLayout();
    const W = Game.width, H = Game.height;
    // 果實放在上半部（兩排）
    const fruitY1 = H*0.25, fruitY2 = H*0.40;
    const fruitSpacing = Math.min(W*0.12, 90);
    const fruitStartX = W*0.5 - fruitSpacing*1;
    this.fruits.forEach((f, i) => {
      const row = Math.floor(i / 3);
      const col = i % 3;
      f.baseX = fruitStartX + col * fruitSpacing;
      f.baseY = row === 0 ? fruitY1 : fruitY2;
      if (f.placed === null) { f.x = f.baseX; f.y = f.baseY; }
    });
    // 籃子放在下半部（一排）
    const basketY = H*0.7;
    const basketSpacing = Math.min(W*0.18, 130);
    const basketStartX = W*0.5 - basketSpacing*1.5;
    this.baskets.forEach((b, i) => {
      b.x = basketStartX + i * basketSpacing;
      b.y = basketY;
    });
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;

    // 選果實
    if (!this.selectedFruit) {
      for (const f of this.fruits) {
        if (f.placed !== null) continue;
        const dx = x - f.x, dy = y - f.y;
        if (dx*dx + dy*dy < 28*28) {
          this.selectedFruit = f;
          return;
        }
      }
    } else {
      // 點籃子放入
      for (const b of this.baskets) {
        const dx = x - b.x, dy = y - b.y;
        if (dx*dx + dy*dy < 50*50) {
          // 檢查條件
          const f = this.selectedFruit;
          if (f.color === b.color && f.shape === b.shape) {
            f.placed = b.id;
            this.placedCount++;
            this.showFeedback(`✨ 對了！${f.color === 'red' ? '紅' : '藍'}+${f.shape === 'round' ? '圓' : '方'} 放對籃子`, '#81c784');
            this.selectedFruit = null;
            if (this.placedCount >= 6) {
              setTimeout(() => this.startWalk(), 800);
            }
          } else {
            this.showFeedback('❌ 籃子條件不對！再仔細看看', '#ff7043');
            this.selectedFruit = null;
          }
          return;
        }
      }
      // 點空白：取消選擇
      this.selectedFruit = null;
    }
  }
  update(dt) {
    this.baseUpdate(dt);
    // 已放入籃子的果實移動到籃子位置
    for (const f of this.fruits) {
      if (f.placed !== null) {
        const b = this.baskets[f.placed];
        f.x += (b.x - f.x) * dt * 8;
        f.y += (b.y - 18 - f.y) * dt * 8;
      }
    }
  }
  drawBackground(ctx) {
    const W = Game.width, H = Game.height;
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1b5e20'); sky.addColorStop(0.4, '#2e7d32');
    sky.addColorStop(0.8, '#388e3c'); sky.addColorStop(1, '#1b5e20');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    // 樹木
    ctx.fillStyle = '#0d3a10';
    for (let i = 0; i < 6; i++) {
      const tx = W * (i+0.5) / 6 + Math.sin(i*1.7) * 30;
      const th = 80;
      ctx.fillRect(tx-6, this.groundY - 30, 12, 30);
      ctx.beginPath(); ctx.arc(tx, this.groundY - 60, 35, 0, Math.PI*2); ctx.fill();
    }
    const gd = ctx.createLinearGradient(0, this.groundY, 0, H);
    gd.addColorStop(0, '#2e5b1f'); gd.addColorStop(1, '#1a3a10');
    ctx.fillStyle = gd;
    ctx.fillRect(0, this.groundY, W, H - this.groundY);
  }
  drawForeground(ctx) {
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color; ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;
  }
  drawFruit(ctx, f, scale = 1) {
    const fillColor = f.color === 'red' ? '#e53935' : '#1e88e5';
    const darkColor = f.color === 'red' ? '#7f0000' : '#0d47a1';
    const r = 22 * scale;
    if (f.shape === 'round') {
      // 圓形果實
      const grad = ctx.createRadialGradient(f.x-r*0.3, f.y-r*0.3, 0, f.x, f.y, r);
      grad.addColorStop(0, f.color === 'red' ? '#ff8a80' : '#90caf9');
      grad.addColorStop(1, fillColor);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
      // 葉子
      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.ellipse(f.x+r*0.3, f.y-r*1.1, 5, 8, -0.5, 0, Math.PI*2); ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(f.x-r*0.3, f.y-r*0.4, r*0.3, 0, Math.PI*2); ctx.fill();
    } else {
      // 方形果實
      const grad = ctx.createLinearGradient(f.x-r, f.y-r, f.x+r, f.y+r);
      grad.addColorStop(0, f.color === 'red' ? '#ff8a80' : '#90caf9');
      grad.addColorStop(1, fillColor);
      ctx.fillStyle = grad;
      ctx.fillRect(f.x-r, f.y-r, r*2, r*2);
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 2;
      ctx.strokeRect(f.x-r, f.y-r, r*2, r*2);
      // 葉子（在上方）
      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.ellipse(f.x+r*0.3, f.y-r*1.2, 5, 8, -0.5, 0, Math.PI*2); ctx.fill();
      // 高光
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(f.x-r+3, f.y-r+3, r*0.6, 4);
    }
  }
  drawBasket(ctx, b) {
    // 籃子身體
    ctx.fillStyle = '#8b4513';
    ctx.beginPath();
    ctx.moveTo(b.x-45, b.y-15);
    ctx.lineTo(b.x+45, b.y-15);
    ctx.lineTo(b.x+38, b.y+25);
    ctx.lineTo(b.x-38, b.y+25);
    ctx.closePath(); ctx.fill();
    // 籃子紋路
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 5; i++) {
      const yOffset = b.y-12 + i*8;
      ctx.beginPath();
      ctx.moveTo(b.x-44+i*2, yOffset);
      ctx.lineTo(b.x+44-i*2, yOffset);
      ctx.stroke();
    }
    // 籃子把手
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(b.x, b.y-15, 30, Math.PI, 0, true);
    ctx.stroke();

    // 條件圖示（在籃子上方）— 顏色用文字、形狀用「不上色」純框
    const iconY = b.y - 50;
    // 1️⃣ 顏色文字
    const colorText = b.color === 'red' ? '紅' : '藍';
    const colorTextFill = b.color === 'red' ? '#ff5252' : '#42a5f5';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(b.x-30, iconY-12, 22, 22);
    ctx.fillStyle = colorTextFill;
    ctx.font = 'bold 16px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(colorText, b.x-19, iconY);

    // + 號
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px -apple-system';
    ctx.fillText('+', b.x-2, iconY);

    // 2️⃣ 形狀圖（純線條，不上色）
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    if (b.shape === 'round') {
      ctx.beginPath();
      ctx.arc(b.x+18, iconY, 11, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    } else {
      ctx.fillRect(b.x+8, iconY-11, 22, 22);
      ctx.strokeRect(b.x+8, iconY-11, 22, 22);
    }
    ctx.textBaseline = 'alphabetic';

    // 籃子號碼
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(`${b.id+1}`, b.x, b.y+12);
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 籃子
    for (const b of this.baskets) this.drawBasket(ctx, b);

    // 果實（已放好的最後畫，疊在籃子上）
    const unplaced = this.fruits.filter(f => f.placed === null);
    const placed = this.fruits.filter(f => f.placed !== null);
    for (const f of unplaced) {
      // 選中的會放大
      const isSelected = this.selectedFruit && this.selectedFruit.id === f.id;
      const scale = isSelected ? 1.2 + Math.sin(this.time*5)*0.05 : 1;
      // 選中的有光暈
      if (isSelected) {
        ctx.fillStyle = `rgba(255,235,59,${0.3+Math.sin(this.time*4)*0.2})`;
        ctx.beginPath(); ctx.arc(f.x, f.y, 36, 0, Math.PI*2); ctx.fill();
      }
      this.drawFruit(ctx, f, scale);
    }
    for (const f of placed) this.drawFruit(ctx, f, 0.7);

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);

    this.drawHeader(ctx, '🌿 森林大陸 — 第 1 關 果實分類',
      this.selectedFruit ? '👆 點對的籃子放進去' : `點果實選擇 (${this.placedCount}/6)`);
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 多重條件分類', [
        '看果實要符合「兩個條件」：',
        '🎨 顏色（紅 / 藍）',
        '🔷 形狀（圓 / 方）',
        '',
        '紅+圓 不等於 紅+方！',
        '兩個條件都要對才放對籃子',
        '',
        '✨ 這就是程式設計的「if A 而且 B」',
        '是寫程式最重要的基本功！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '果實全部分對了！');
    this.drawEnterFade(ctx);
  }
}

/* ============================================================
   ❄️ 冰之大陸地圖
   ============================================================ */
class IceMapScene {
  constructor() {
    this.name = 'IceMap';
    this.time = 0;
    this.snowflakes = [];
    this.cat = null;
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);
    this.backBtn = { x: 50, y: 30, r: 22 };
    this.levels = [];
  }
  enter() {
    this.layout();
    this.cat = new PixelCat(Game.width * 0.5, Game.height * 0.85);
    this.cat.scale = 2;
    for (let i = 0; i < 60; i++) {
      this.snowflakes.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height,
        vy: 30+Math.random()*40, vx: -10+Math.random()*20,
        size: 1+Math.random()*3,
        sway: Math.random()*Math.PI*2,
      });
    }
  }
  onResize() { this.layout(); }
  layout() {
    const W = Game.width, H = Game.height;
    const lv = Game.progress.iceLevel || 0;
    this.levels = [
      { num: 1, name: '雪地偵探', x: W*0.25, y: H*0.55, cleared: lv>=1, unlocked: true,    r: 36 },
      { num: 2, name: '?', x: W*0.42, y: H*0.42, cleared: lv>=2, unlocked: lv>=1, r: 36 },
      { num: 3, name: '?', x: W*0.58, y: H*0.55, cleared: lv>=3, unlocked: lv>=2, r: 36 },
      { num: 4, name: '?', x: W*0.75, y: H*0.42, cleared: lv>=4, unlocked: lv>=3, r: 36 },
    ];
  }
  onTap(x, y) {
    const bx = x - this.backBtn.x, by = y - this.backBtn.y;
    if (bx*bx + by*by < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new WorldMapScene()); return;
    }
    for (const lv of this.levels) {
      if (!lv.unlocked) continue;
      const dx = x - lv.x, dy = y - lv.y;
      if (dx*dx + dy*dy < lv.r*lv.r) {
        if (lv.num === 1) Game.changeScene(new IceLevel1Scene());
        return;
      }
    }
  }
  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);
    for (const s of this.snowflakes) {
      s.y += s.vy * dt;
      s.x += Math.sin(this.time*2 + s.sway) * 15 * dt;
      if (s.y > Game.height + 5) { s.y = -5; s.x = Math.random()*Game.width; }
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    // 冰雪天空
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a3a5a'); sky.addColorStop(0.4, '#5a8aaa');
    sky.addColorStop(0.8, '#bbdefb'); sky.addColorStop(1, '#e3f2fd');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // 極光（背景）
    const auroraY = H * 0.2;
    for (let i = 0; i < 3; i++) {
      const grad = ctx.createLinearGradient(0, auroraY-30+i*8, 0, auroraY+30+i*8);
      const colors = [
        ['rgba(76,175,80,0)', 'rgba(76,175,80,0.3)', 'rgba(76,175,80,0)'],
        ['rgba(156,39,176,0)', 'rgba(156,39,176,0.2)', 'rgba(156,39,176,0)'],
        ['rgba(33,150,243,0)', 'rgba(33,150,243,0.2)', 'rgba(33,150,243,0)'],
      ][i];
      grad.addColorStop(0, colors[0]); grad.addColorStop(0.5, colors[1]); grad.addColorStop(1, colors[2]);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, auroraY + Math.sin(this.time*0.5+i)*5);
      for (let x = 0; x <= W; x += 30) {
        ctx.lineTo(x, auroraY + Math.sin(this.time*0.5 + x*0.01 + i*2)*15 + i*8);
      }
      ctx.lineTo(W, auroraY + 60); ctx.lineTo(0, auroraY + 60);
      ctx.closePath(); ctx.fill();
    }

    // 遠方雪山剪影
    ctx.fillStyle = '#90a4ae';
    ctx.beginPath();
    ctx.moveTo(0, H*0.6);
    ctx.lineTo(W*0.15, H*0.4); ctx.lineTo(W*0.25, H*0.5);
    ctx.lineTo(W*0.4, H*0.35); ctx.lineTo(W*0.55, H*0.45);
    ctx.lineTo(W*0.7, H*0.38); ctx.lineTo(W*0.85, H*0.5);
    ctx.lineTo(W, H*0.42); ctx.lineTo(W, H*0.7); ctx.lineTo(0, H*0.7);
    ctx.closePath(); ctx.fill();
    // 雪山頂的雪
    ctx.fillStyle = '#fff';
    [[W*0.15, H*0.4], [W*0.4, H*0.35], [W*0.7, H*0.38]].forEach(([px, py]) => {
      ctx.beginPath();
      ctx.moveTo(px-15, py+5);
      ctx.lineTo(px, py-2);
      ctx.lineTo(px+15, py+5);
      ctx.closePath(); ctx.fill();
    });

    // 雪地地面
    const gd = ctx.createLinearGradient(0, H*0.7, 0, H);
    gd.addColorStop(0, '#e3f2fd'); gd.addColorStop(1, '#90caf9');
    ctx.fillStyle = gd;
    ctx.fillRect(0, H*0.7, W, H*0.3);

    // 路徑
    ctx.strokeStyle = 'rgba(100,150,200,0.5)';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(this.cat.x, this.cat.y - 30);
    for (let i = 0; i < this.levels.length; i++) {
      const lv = this.levels[i];
      if (i === 0) ctx.lineTo(lv.x, lv.y);
      else {
        const prev = this.levels[i-1];
        const mx = (prev.x + lv.x) / 2;
        const my = (prev.y + lv.y) / 2 + (i % 2 === 0 ? 30 : -30);
        ctx.quadraticCurveTo(mx, my, lv.x, lv.y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 關卡圖示
    for (const lv of this.levels) {
      const bob = Math.sin(this.time*2 + lv.num) * 4;
      const cy = lv.y + bob;
      if (lv.unlocked && !lv.cleared) {
        ctx.fillStyle = `rgba(150,220,255,${0.3+Math.sin(this.time*3+lv.num)*0.2})`;
        ctx.beginPath(); ctx.arc(lv.x, cy, lv.r+18, 0, Math.PI*2); ctx.fill();
      }
      const grad = ctx.createRadialGradient(lv.x, cy, 0, lv.x, cy, lv.r);
      if (lv.cleared) { grad.addColorStop(0, '#ffd700'); grad.addColorStop(1, '#b8860b'); }
      else if (lv.unlocked) { grad.addColorStop(0, '#90caf9'); grad.addColorStop(1, '#1976d2'); }
      else { grad.addColorStop(0, '#3a4a5a'); grad.addColorStop(1, '#1a2a3a'); }
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(lv.x, cy, lv.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = lv.cleared ? '#fff8d0' : (lv.unlocked ? '#bbdefb' : '#5a6a7a');
      ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = lv.unlocked ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 28px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(lv.unlocked ? `${lv.num}` : '🔒', lv.x, cy);
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = lv.unlocked ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      ctx.font = '13px -apple-system, "PingFang TC"';
      ctx.fillText(lv.name, lv.x, cy + lv.r + 22);
      if (lv.cleared) {
        ctx.fillStyle = '#4caf50';
        ctx.beginPath(); ctx.arc(lv.x+lv.r-8, cy-lv.r+8, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system'; ctx.textBaseline = 'middle';
        ctx.fillText('✓', lv.x+lv.r-8, cy-lv.r+9);
        ctx.textBaseline = 'alphabetic';
      }
    }

    if (this.cat) this.cat.draw(ctx);

    // 雪花
    for (const s of this.snowflakes) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 110, 16, 220, 36);
    ctx.fillStyle = '#bbdefb';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('❄️ 冰之大陸 — 選擇關卡', W/2, 40);
    const lv = Game.progress.iceLevel || 0;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px -apple-system, "PingFang TC"';
    ctx.fillText(`進度：${lv} / 4 關（V1 僅開放第 1 關）`, W/2, 70);

    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ============================================================
   ❄️ 冰之大陸第 1 關：雪地偵探（解謎推理）
   說明：寶石被偷！3 個嫌疑犯，3 個線索，要綜合推理找出小偷
   特徵表：
     🦊 小狐狸：中 / 橘 / 中
     🐧 小企鵝：小 / 黑白 / 矮
     🐰 大白兔：大 / 白 / 高（正解！3 個線索都符合）
   ============================================================ */
class IceLevel1Scene extends FireLevelBase {
  constructor() {
    super(1);
    this.name = 'Ice L1';
    this.continent = 'ice';
    this.mapSceneClass = IceMapScene;
    this.snowflakes = [];
    // 3 個嫌疑犯（順序刻意把正解放中間，避免直覺按第一個）
    this.suspects = [
      { id: 'fox',     name:'小狐狸', size:'中', color:'橘',   height:'中', x:0, y:0 },
      { id: 'rabbit',  name:'大白兔', size:'大', color:'白',   height:'高', x:0, y:0, isThief: true },
      { id: 'penguin', name:'小企鵝', size:'小', color:'黑白', height:'矮', x:0, y:0 },
    ];
    // 3 個線索（一開始隱藏，要點才顯示）
    this.clues = [
      { id: 0, icon:'🐾', label:'腳印',    text:'地上腳印很大', revealed: false, x:0, y:0 },
      { id: 1, icon:'🧶', label:'毛髮',    text:'地上有白色毛髮', revealed: false, x:0, y:0 },
      { id: 2, icon:'📏', label:'高度',    text:'寶石箱被打破在很高的地方', revealed: false, x:0, y:0 },
    ];
    this.solved = false;
    this.wrongChoice = null;     // 選錯的嫌疑犯（顯示問號）
    this.wrongTimer = 0;
  }
  layout() {
    this.baseLayout();
    const W = Game.width, H = Game.height;
    // 線索卡（畫面下方一排）
    const clueY = H - 70;
    const clueSpacing = Math.min(W*0.22, 160);
    const clueStartX = W*0.5 - clueSpacing*1;
    this.clues.forEach((c, i) => {
      c.x = clueStartX + i * clueSpacing;
      c.y = clueY;
    });
    // 嫌疑犯（畫面中間排）
    const susY = H*0.45;
    const susSpacing = Math.min(W*0.20, 150);
    const susStartX = W*0.5 - susSpacing*1;
    this.suspects.forEach((s, i) => {
      s.x = susStartX + i * susSpacing;
      s.y = susY;
    });
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onEnter() {
    for (let i = 0; i < 50; i++) {
      this.snowflakes.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height,
        vy: 30+Math.random()*40, vx: -10+Math.random()*20,
        size: 1+Math.random()*3, sway: Math.random()*Math.PI*2,
      });
    }
  }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    if (this.solved) return;

    // 點線索卡
    for (const c of this.clues) {
      const dx = x - c.x, dy = y - c.y;
      if (dx*dx + dy*dy < 50*50) {
        c.revealed = true;
        return;
      }
    }
    // 點嫌疑犯
    for (const s of this.suspects) {
      const dx = x - s.x, dy = y - s.y - 10;
      if (dx*dx + dy*dy < 60*60) {
        // 確認所有線索都看過了
        const allRevealed = this.clues.every(c => c.revealed);
        if (!allRevealed) {
          this.showFeedback('🔍 還有線索沒看，先點開所有線索卡', '#ffb74d');
          return;
        }
        if (s.isThief) {
          this.solved = true;
          this.showFeedback('🎉 抓到了！就是大白兔！', '#ffd700');
          setTimeout(() => this.startWalk(), 1500);
        } else {
          this.wrongChoice = s.id;
          this.wrongTimer = 1.5;
          this.showFeedback('❌ 線索不符！再仔細想想', '#ff7043');
        }
        return;
      }
    }
  }
  update(dt) {
    this.baseUpdate(dt);
    if (this.wrongTimer > 0) {
      this.wrongTimer -= dt;
      if (this.wrongTimer <= 0) this.wrongChoice = null;
    }
    for (const s of this.snowflakes) {
      s.y += s.vy * dt;
      s.x += Math.sin(this.time*2 + s.sway) * 15 * dt;
      if (s.y > Game.height + 5) { s.y = -5; s.x = Math.random()*Game.width; }
    }
  }
  drawBackground(ctx) {
    const W = Game.width, H = Game.height;
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a3a5a'); sky.addColorStop(0.4, '#5a8aaa');
    sky.addColorStop(0.8, '#bbdefb'); sky.addColorStop(1, '#e3f2fd');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    // 極光
    const auroraY = H * 0.15;
    for (let i = 0; i < 3; i++) {
      const grad = ctx.createLinearGradient(0, auroraY-20+i*6, 0, auroraY+20+i*6);
      const colors = [
        ['rgba(76,175,80,0)', 'rgba(76,175,80,0.25)', 'rgba(76,175,80,0)'],
        ['rgba(156,39,176,0)', 'rgba(156,39,176,0.18)', 'rgba(156,39,176,0)'],
        ['rgba(33,150,243,0)', 'rgba(33,150,243,0.18)', 'rgba(33,150,243,0)'],
      ][i];
      grad.addColorStop(0, colors[0]); grad.addColorStop(0.5, colors[1]); grad.addColorStop(1, colors[2]);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, auroraY + Math.sin(this.time*0.5+i)*5);
      for (let x = 0; x <= W; x += 30) {
        ctx.lineTo(x, auroraY + Math.sin(this.time*0.5 + x*0.01 + i*2)*12 + i*6);
      }
      ctx.lineTo(W, auroraY + 50); ctx.lineTo(0, auroraY + 50);
      ctx.closePath(); ctx.fill();
    }
    // 雪地
    const gd = ctx.createLinearGradient(0, this.groundY, 0, H);
    gd.addColorStop(0, '#e3f2fd'); gd.addColorStop(1, '#90caf9');
    ctx.fillStyle = gd;
    ctx.fillRect(0, this.groundY, W, H - this.groundY);
  }
  drawForeground(ctx) {
    // 雪花
    for (const s of this.snowflakes) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    }
    // 慶祝
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color; ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;
  }
  drawSuspect(ctx, s) {
    const cx = s.x, cy = s.y;
    const isWrong = this.wrongChoice === s.id;
    const wrongShake = isWrong ? Math.sin(this.time*30) * 3 : 0;

    // 影子
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(cx + wrongShake, cy + 50, 30, 6, 0, 0, Math.PI*2); ctx.fill();

    if (s.id === 'fox') {
      // 小狐狸（中等大小、橘色）
      const baseY = cy + 50;
      ctx.fillStyle = '#ff7043';
      // 身體
      ctx.beginPath(); ctx.ellipse(cx + wrongShake, baseY - 18, 20, 24, 0, 0, Math.PI*2); ctx.fill();
      // 頭
      ctx.beginPath(); ctx.arc(cx + wrongShake, baseY - 42, 16, 0, Math.PI*2); ctx.fill();
      // 耳朵
      ctx.beginPath();
      ctx.moveTo(cx-12+wrongShake, baseY-50); ctx.lineTo(cx-8+wrongShake, baseY-62); ctx.lineTo(cx-3+wrongShake, baseY-50);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx+12+wrongShake, baseY-50); ctx.lineTo(cx+8+wrongShake, baseY-62); ctx.lineTo(cx+3+wrongShake, baseY-50);
      ctx.closePath(); ctx.fill();
      // 白肚子
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(cx+wrongShake, baseY-12, 8, 14, 0, 0, Math.PI*2); ctx.fill();
      // 尾巴
      ctx.fillStyle = '#ff7043';
      ctx.beginPath(); ctx.ellipse(cx+22+wrongShake, baseY-15, 8, 14, 0.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx+27+wrongShake, baseY-10, 5, 0, Math.PI*2); ctx.fill();
      // 眼睛
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx-5+wrongShake, baseY-44, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+5+wrongShake, baseY-44, 2, 0, Math.PI*2); ctx.fill();
      // 鼻子
      ctx.beginPath(); ctx.arc(cx+wrongShake, baseY-37, 1.5, 0, Math.PI*2); ctx.fill();
    } else if (s.id === 'rabbit') {
      // 大白兔（大、白色、高）
      const baseY = cy + 55;
      const jumpOffset = Math.abs(Math.sin(this.time*1.5)) * 6;
      // 身體（大）
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(cx + wrongShake, baseY - 30 - jumpOffset, 26, 32, 0, 0, Math.PI*2); ctx.fill();
      // 頭
      ctx.beginPath(); ctx.arc(cx + wrongShake, baseY - 60 - jumpOffset, 20, 0, Math.PI*2); ctx.fill();
      // 大耳朵（高！）
      ctx.beginPath(); ctx.ellipse(cx-10+wrongShake, baseY-78-jumpOffset, 6, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+10+wrongShake, baseY-78-jumpOffset, 6, 18, 0, 0, Math.PI*2); ctx.fill();
      // 耳朵內粉
      ctx.fillStyle = '#ffcdd2';
      ctx.beginPath(); ctx.ellipse(cx-10+wrongShake, baseY-78-jumpOffset, 3, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+10+wrongShake, baseY-78-jumpOffset, 3, 12, 0, 0, Math.PI*2); ctx.fill();
      // 眼睛
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx-7+wrongShake, baseY-62-jumpOffset, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+7+wrongShake, baseY-62-jumpOffset, 2.5, 0, Math.PI*2); ctx.fill();
      // 鼻子
      ctx.fillStyle = '#ff8fa0';
      ctx.beginPath(); ctx.arc(cx+wrongShake, baseY-55-jumpOffset, 2, 0, Math.PI*2); ctx.fill();
      // 邊框（讓白色可見）
      ctx.strokeStyle = '#bbdefb';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(cx+wrongShake, baseY-30-jumpOffset, 26, 32, 0, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx+wrongShake, baseY-60-jumpOffset, 20, 0, Math.PI*2); ctx.stroke();
    } else if (s.id === 'penguin') {
      // 小企鵝（小、黑白、矮）
      const baseY = cy + 50;
      // 身體（小）
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.ellipse(cx + wrongShake, baseY - 12, 14, 20, 0, 0, Math.PI*2); ctx.fill();
      // 白肚子
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(cx + wrongShake, baseY - 10, 8, 15, 0, 0, Math.PI*2); ctx.fill();
      // 頭
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(cx + wrongShake, baseY - 32, 12, 0, Math.PI*2); ctx.fill();
      // 白臉
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx + wrongShake, baseY - 30, 8, 0, Math.PI*2); ctx.fill();
      // 眼睛
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx-3+wrongShake, baseY-32, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+3+wrongShake, baseY-32, 1.5, 0, Math.PI*2); ctx.fill();
      // 嘴
      ctx.fillStyle = '#ffa726';
      ctx.beginPath();
      ctx.moveTo(cx-2+wrongShake, baseY-28); ctx.lineTo(cx+wrongShake, baseY-25); ctx.lineTo(cx+2+wrongShake, baseY-28);
      ctx.closePath(); ctx.fill();
      // 翅膀
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.ellipse(cx-12+wrongShake, baseY-12, 4, 10, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+12+wrongShake, baseY-12, 4, 10, -0.3, 0, Math.PI*2); ctx.fill();
      // 腳
      ctx.fillStyle = '#ffa726';
      ctx.fillRect(cx-6+wrongShake, baseY+5, 4, 4);
      ctx.fillRect(cx+2+wrongShake, baseY+5, 4, 4);
    }

    // 名牌
    ctx.fillStyle = isWrong ? '#ff5252' : 'rgba(0,0,0,0.5)';
    ctx.fillRect(cx-30, cy+58, 60, 18);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.name, cx, cy+67);
    ctx.textBaseline = 'alphabetic';

    // 答錯時的問號
    if (isWrong) {
      const a = this.wrongTimer / 1.5;
      ctx.fillStyle = `rgba(255,82,82,${a})`;
      ctx.font = 'bold 36px -apple-system';
      ctx.fillText('❓', cx, cy - 70);
    }
  }
  drawClueCard(ctx, c) {
    const cw = 140, ch = 90;
    const cx = c.x - cw/2, cy = c.y - ch/2;
    if (c.revealed) {
      ctx.fillStyle = 'rgba(255,253,220,0.95)';
      ctx.strokeStyle = '#ffd700';
    } else {
      ctx.fillStyle = 'rgba(60,60,90,0.85)';
      ctx.strokeStyle = '#90caf9';
    }
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cw, ch, 10);
    else ctx.rect(cx, cy, cw, ch);
    ctx.fill(); ctx.stroke();

    if (c.revealed) {
      // 圖示
      ctx.font = '28px -apple-system';
      ctx.textAlign = 'center';
      ctx.fillText(c.icon, c.x, c.y - 14);
      // 標題
      ctx.fillStyle = '#5a3a10';
      ctx.font = 'bold 12px -apple-system, "PingFang TC"';
      ctx.fillText(c.label, c.x, c.y + 8);
      // 內容
      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 13px -apple-system, "PingFang TC"';
      ctx.fillText(c.text, c.x, c.y + 28);
    } else {
      // 未開啟
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px -apple-system';
      ctx.textAlign = 'center';
      ctx.fillText('🔍', c.x, c.y + 6);
      ctx.font = '11px -apple-system, "PingFang TC"';
      ctx.fillText('點開查看', c.x, c.y + 28);
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 寶石箱（被打破，左上）
    const boxX = W*0.15, boxY = this.groundY - 20;
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(boxX-25, boxY-20, 50, 30);
    // 破洞
    ctx.fillStyle = '#1a0a05';
    ctx.beginPath();
    ctx.moveTo(boxX-15, boxY-22);
    ctx.lineTo(boxX, boxY-30);
    ctx.lineTo(boxX+15, boxY-20);
    ctx.lineTo(boxX+10, boxY-10);
    ctx.lineTo(boxX-10, boxY-10);
    ctx.closePath(); ctx.fill();
    // 殘留珠寶亮點
    ctx.fillStyle = `rgba(76,175,80,${0.5+Math.sin(this.time*4)*0.3})`;
    ctx.beginPath(); ctx.arc(boxX-3, boxY-15, 2, 0, Math.PI*2); ctx.fill();
    // 標籤
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 12px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('💎 寶石箱（被打破）', boxX, boxY + 25);

    // 嫌疑犯
    for (const s of this.suspects) this.drawSuspect(ctx, s);

    // 線索卡（在道具列上方）
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, H-110, W, 110);
    ctx.fillStyle = '#bbdefb';
    ctx.font = 'bold 12px -apple-system, "PingFang TC"';
    ctx.textAlign = 'left';
    ctx.fillText('🔍 線索卡（點開後點嫌疑犯）', 20, H-95);
    for (const c of this.clues) this.drawClueCard(ctx, c);

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);

    const allRevealed = this.clues.every(c => c.revealed);
    this.drawHeader(ctx, '❄️ 冰之大陸 — 第 1 關 雪地偵探',
      allRevealed ? '👆 點你覺得是小偷的嫌疑犯' : `先看完所有線索 (${this.clues.filter(c=>c.revealed).length}/3)`);
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 解謎推理', [
        '看到單一線索不夠！',
        '要把所有線索「**綜合**」起來才能找出答案：',
        '',
        '🐾 腳印很大 → 體型大的',
        '🧶 白色毛 → 白色的',
        '📏 高處被打破 → 高的',
        '',
        '✨ 三個條件都符合的，就是真兇！',
        '這就是「偵探思考」的精髓 🕵️',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '抓到小偷了！');
    this.drawEnterFade(ctx);
  }
}

window.addEventListener('load', () => Game.init());
</script>
