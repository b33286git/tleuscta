* { margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none; }
html, body { width: 100%; height: 100%; overflow: hidden;

  touch-action: none; }
#game-canvas { display: block; width: 100vw; height: 100vh;
  image-rendering: pixelated; image-rendering: crisp-edges; }
#loading { position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
  background: #0a0a1f; color: #fff; z-index: 100;
  transition: opacity 0.6s; }

/* ============================================================
   🛠️ 工具
   ============================================================ */
const Easing = {
  easeOutCubic: t => 1 - Math.pow(1 - t, 3),
  easeInOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2,
  easeOutBack: t => { const c1=1.70158, c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  easeOutElastic: t => {
    const c4 = (2 * Math.PI) / 3;
    return t === 0 ? 0 : t === 1 ? 1
      : Math.pow(2, -10*t) * Math.sin((t*10-0.75) * c4) + 1;
  },
};

class Tween {
  constructor(from, to, duration, easing = Easing.easeOutCubic, onDone = null) {
    this.from = from; this.to = to;
    this.duration = duration; this.easing = easing;
    this.elapsed = 0; this.done = false; this.onDone = onDone;
  }
  update(dt) {
    if (this.done) return this.to;
    this.elapsed += dt;
    const t = Math.min(this.elapsed / this.duration, 1);
    const v = this.from + (this.to - this.from) * this.easing(t);
    if (t >= 1) { this.done = true; if (this.onDone) this.onDone(); }
    return v;
  }
}

/* ============================================================
   🎮 遊戲核心
   ============================================================ */
const Game = {
  canvas: null, ctx: null,
  width: 0, height: 0, dpr: 1,
  lastTime: 0, fps: 0, frames: 0, fpsTimer: 0,
  currentScene: null,
  progress: {
    fire: false, water: false, forest: false, ice: false,
    fireLevel: 0, waterLevel: 0, forestLevel: 0, iceLevel: 0,
  },
  parentMode: false,

  init() {
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 100));

    try {
      const saved = localStorage.getItem('cat-adventure-progress');
      if (saved) this.progress = { ...this.progress, ...JSON.parse(saved) };
      this.parentMode = localStorage.getItem('cat-adventure-parent') === '1';
    } catch (e) {}
    this.updateParentBtn();

    const handleTap = (e) => {
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      const rect = this.canvas.getBoundingClientRect();
      const x = t.clientX - rect.left;
      const y = t.clientY - rect.top;
      if (this.currentScene && this.currentScene.onTap) {
        this.currentScene.onTap(x, y);
      }
    };
    this.canvas.addEventListener('click', handleTap);
    this.canvas.addEventListener('touchstart', handleTap, { passive: false });

    document.getElementById('parent-mode').addEventListener('click', () => {
      this.parentMode = !this.parentMode;
      localStorage.setItem('cat-adventure-parent', this.parentMode ? '1' : '0');
      this.updateParentBtn();
    });

    this.changeScene(new WorldMapScene());
    requestAnimationFrame((t) => this.loop(t));
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 600);
  },

  updateParentBtn() {
    const btn = document.getElementById('parent-mode');
    btn.classList.toggle('on', this.parentMode);
    btn.textContent = this.parentMode ? '🧑‍🏫' : '⚙️';
    btn.title = this.parentMode ? '家長模式：開' : '家長模式：關';
  },

  saveProgress() {
    localStorage.setItem('cat-adventure-progress', JSON.stringify(this.progress));
  },

  resize() {
    this.dpr = window.devicePixelRatio || 1;
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    this.canvas.width = this.width * this.dpr;
    this.canvas.height = this.height * this.dpr;
    this.canvas.style.width = this.width + 'px';
    this.canvas.style.height = this.height + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.ctx.imageSmoothingEnabled = false;
    if (this.currentScene && this.currentScene.onResize) {
      this.currentScene.onResize();
    }
  },

  loop(currentTime) {
    const dt = Math.min((currentTime - this.lastTime) / 1000, 0.05);
    this.lastTime = currentTime;
    this.frames++; this.fpsTimer += dt;
    if (this.fpsTimer >= 1) {
      this.fps = this.frames; this.frames = 0; this.fpsTimer = 0;
      const sceneName = this.currentScene ? this.currentScene.name || '?' : '?';
      document.getElementById('debug').textContent =
        `FPS: ${this.fps} | ${sceneName} | ${this.width}×${this.height}`;
    }
    if (this.currentScene) {
      this.currentScene.update(dt);
      this.currentScene.draw(this.ctx);
    }
    requestAnimationFrame((t) => this.loop(t));
  },

  changeScene(scene) {
    this.currentScene = scene;
    if (scene.enter) scene.enter();
  },
};

const PIXEL_COLORS = {
  B: '#1a1a1a', W: '#f5f5f0',
  P: '#ff8fa0', G: '#2dc653',
  '^': '#ffeb3b', // 慶祝表情
};

class PixelCat {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.scale = 4;
    this.bobTime = 0; this.tailTime = 0;
    this.blinkTimer = 0; this.isBlinking = false;
    this.state = 'idle'; // idle / walk / cheer
    this.flipX = false;
  }
  update(dt) {
    this.bobTime += dt; this.tailTime += dt;
    this.blinkTimer += dt;
    if (this.blinkTimer > 3 + Math.random() * 2) {
      this.isBlinking = true;
      setTimeout(() => { this.isBlinking = false; this.blinkTimer = 0; }, 150);
      this.blinkTimer = 0;
    }
  }
  setState(state) { this.state = state; }
  draw(ctx) {
    let sprite;
    if (this.state === 'cheer') sprite = CAT_SPRITES.cheer;
    else if (this.state === 'walk') {
      sprite = Math.floor(this.tailTime * 6) % 2 === 0 ? CAT_SPRITES.walk1 : CAT_SPRITES.walk2;
    } else {
      sprite = this.isBlinking ? CAT_SPRITES.blink
        : (Math.floor(this.tailTime * 2) % 2 === 0 ? CAT_SPRITES.idle : CAT_SPRITES.idle2);
    }

    const bobOffset = this.state === 'walk'
      ? Math.abs(Math.sin(this.tailTime * 12)) * 3
      : Math.sin(this.bobTime * 2) * 2;
    const px = this.scale;
    const w = sprite[0].length;
    const h = sprite.length;
    const startX = this.x - (w * px) / 2;
    const startY = this.y - h * px - bobOffset;

    // 影子
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - 2, w * px * 0.32, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    if (this.flipX) {
      ctx.translate(this.x, 0);
      ctx.scale(-1, 1);
      ctx.translate(-this.x, 0);
    }
    for (let row = 0; row < h; row++) {
      for (let col = 0; col < w; col++) {
        const ch = sprite[row][col];
        if (ch === '.' || !PIXEL_COLORS[ch]) continue;
        ctx.fillStyle = PIXEL_COLORS[ch];
        ctx.fillRect(startX + col * px, startY + row * px, px, px);
      }
    }
    ctx.restore();
  }
}

/* ============================================================
   🏝️ 大陸（世界地圖用）
   ============================================================ */
class Continent {
  constructor(config) {
    Object.assign(this, config);
    this.bobOffset = Math.random() * Math.PI * 2;
    this.bobAmp = 8 + Math.random() * 4;
    this.time = 0;
    this.particles = [];
    this.fogParticles = [];
    for (let i = 0; i < 25; i++) {
      this.fogParticles.push({
        x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*100,
        size: 20+Math.random()*30, speed: 0.3+Math.random()*0.5,
        alpha: 0.15+Math.random()*0.25,
      });
    }
    for (let i = 0; i < 12; i++) {
      this.particles.push({
        x: (Math.random()-0.5)*120, y: (Math.random()-0.5)*60,
        vy: -0.5-Math.random(), size: 1+Math.random()*2,
        life: Math.random(),
      });
    }
  }
  get isCleared() { return Game.progress[this.id]; }

  update(dt) {
    this.time += dt;
    for (const p of this.fogParticles) {
      p.x += p.speed * dt * 10;
      if (p.x > 120) p.x = -120;
    }
    for (const p of this.particles) {
      p.life += dt * 0.5;
      p.y += p.vy;
      if (p.life > 1) { p.life = 0; p.x = (Math.random()-0.5)*120; p.y = 30; }
    }
  }
  hitTest(px, py) {
    const dx = px - this.x;
    const dy = py - (this.y + Math.sin(this.time*1.2 + this.bobOffset) * this.bobAmp);
    return dx*dx + dy*dy < 90*90;
  }
  draw(ctx) {
    const yOff = Math.sin(this.time*1.2 + this.bobOffset) * this.bobAmp;
    const cx = this.x, cy = this.y + yOff;

    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 75, 95, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx-25, cy+80, 60, 12, 0, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = this.accent;
    ctx.beginPath();
    ctx.moveTo(cx-70, cy+20); ctx.lineTo(cx+70, cy+20);
    ctx.lineTo(cx+45, cy+65); ctx.lineTo(cx-45, cy+65);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(cx, cy+15, 80, 30, 0, 0, Math.PI*2); ctx.fill();

    this.drawTheme(ctx, cx, cy);

    if (!this.isCleared) {
      for (const p of this.fogParticles) {
        const g = ctx.createRadialGradient(cx+p.x, cy+p.y, 0, cx+p.x, cy+p.y, p.size);
        g.addColorStop(0, `rgba(180,180,200,${p.alpha})`);
        g.addColorStop(1, 'rgba(180,180,200,0)');
        ctx.fillStyle = g;
        ctx.fillRect(cx+p.x-p.size, cy+p.y-p.size, p.size*2, p.size*2);
      }
    } else {
      // 已破關：閃亮星星
      for (let i = 0; i < 5; i++) {
        const a = (this.time * 2 + i) % (Math.PI * 2);
        const r = 60 + Math.sin(a * 0.5) * 10;
        const sx = cx + Math.cos(a) * r;
        const sy = cy + 15 + Math.sin(a) * 25;
        ctx.fillStyle = `rgba(255,215,0,${0.6 + Math.sin(this.time*4+i)*0.4})`;
        ctx.fillRect(sx, sy, 2, 2);
      }
    }

    ctx.save();
    ctx.font = 'bold 16px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.fillStyle = this.isCleared ? '#ffd700' : 'rgba(255,255,255,0.7)';
    const label = this.isCleared ? `✨ ${this.name} ✨` : `${this.emoji} ${this.name}`;
    ctx.fillText(label, cx, cy + 100);
    ctx.restore();
  }
  drawTheme(ctx, cx, cy) {
    switch (this.type) {
      case 'fire':
        ctx.fillStyle = '#3a1810';
        ctx.beginPath();
        ctx.moveTo(cx-35, cy+5); ctx.lineTo(cx, cy-50); ctx.lineTo(cx+35, cy+5);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ff5722';
        ctx.beginPath(); ctx.ellipse(cx, cy-48, 12, 5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffeb3b';
        ctx.beginPath(); ctx.ellipse(cx, cy-49, 6, 2.5, 0, 0, Math.PI*2); ctx.fill();
        for (const p of this.particles) {
          const a = 1 - p.life;
          ctx.fillStyle = `rgba(255, ${Math.floor(150+p.life*100)}, 50, ${a})`;
          ctx.fillRect(cx+p.x*0.3, cy-50+p.y, p.size, p.size);
        }
        break;
      case 'water':
        ctx.fillStyle = '#1e88e5';
        ctx.beginPath(); ctx.ellipse(cx, cy+5, 60, 14, 0, 0, Math.PI*2); ctx.fill();
        for (let i = 0; i < 3; i++) {
          const wx = cx + Math.sin(this.time*2 + i) * 30;
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillRect(wx, cy+2, 8, 1);
        }
        ctx.fillStyle = '#5d4037'; ctx.fillRect(cx-22, cy-25, 4, 25);
        ctx.fillStyle = '#43a047';
        ctx.beginPath(); ctx.arc(cx-20, cy-28, 12, 0, Math.PI*2); ctx.fill();
        for (const p of this.particles) {
          if (p.y < 0) continue;
          ctx.fillStyle = `rgba(100,200,255,${1-p.life})`;
          ctx.fillRect(cx+p.x*0.4, cy+p.y*0.5, 2, 4);
        }
        break;
      case 'forest':
        ctx.fillStyle = '#5d4037'; ctx.fillRect(cx-4, cy-30, 8, 35);
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath(); ctx.arc(cx, cy-35, 22, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#43a047';
        ctx.beginPath(); ctx.arc(cx-12, cy-30, 14, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+12, cy-30, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(cx-25, cy+5, 4, 6); ctx.fillRect(cx+22, cy+8, 3, 5);
        ctx.fillStyle = '#e53935';
        ctx.beginPath(); ctx.arc(cx-23, cy+4, 4, Math.PI, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+23, cy+7, 3.5, Math.PI, Math.PI*2); ctx.fill();
        for (const p of this.particles) {
          ctx.fillStyle = `rgba(76,175,80,${0.5+p.life*0.5})`;
          ctx.fillRect(cx+p.x*0.3+Math.sin(p.life*6)*3, cy-20+p.y, 3, 2);
        }
        break;
      case 'ice':
        ctx.fillStyle = '#bbdefb';
        ctx.beginPath();
        ctx.moveTo(cx-30, cy+5); ctx.lineTo(cx-10, cy-40);
        ctx.lineTo(cx+5, cy-25); ctx.lineTo(cx+25, cy-45); ctx.lineTo(cx+35, cy+5);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.moveTo(cx-10, cy-40); ctx.lineTo(cx-5, cy-35);
        ctx.lineTo(cx-5, cy+5); ctx.lineTo(cx-12, cy+5);
        ctx.closePath(); ctx.fill();
        for (const p of this.particles) {
          ctx.fillStyle = `rgba(255,255,255,${1-p.life})`;
          const sx = cx+p.x*0.3+Math.sin(p.life*4)*4;
          const sy = cy-30+p.y*1.5;
          ctx.fillRect(sx, sy, 2, 2);
        }
        const ag = ctx.createLinearGradient(cx-50, cy-60, cx+50, cy-60);
        ag.addColorStop(0, 'rgba(76,175,80,0)');
        ag.addColorStop(0.5, 'rgba(129,199,132,0.3)');
        ag.addColorStop(1, 'rgba(76,175,80,0)');
        ctx.fillStyle = ag;
        ctx.fillRect(cx-50, cy-70+Math.sin(this.time)*3, 100, 8);
        break;
    }
  }
}

/* ============================================================
   🌍 世界地圖場景
   ============================================================ */
class WorldMapScene {
  constructor() {
    this.name = 'WorldMap';
    this.time = 0;
    this.stars = []; this.clouds = []; this.continents = [];
    this.cat = null;
    this.zoomTween = null; this.zoomTarget = null;
    this.cameraScale = 1; this.cameraX = 0; this.cameraY = 0;
    this.transitioning = false; this.fadeAlpha = 0;
  }
  enter() {
    for (let i = 0; i < 100; i++) {
      this.stars.push({
        x: Math.random(), y: Math.random()*0.6,
        size: Math.random()*1.6+0.6,
        twinkle: Math.random()*Math.PI*2,
        speed: 1.5+Math.random()*2,
      });
    }
    for (let i = 0; i < 6; i++) {
      this.clouds.push({
        x: Math.random(), y: 0.65+Math.random()*0.3,
        speed: 0.005+Math.random()*0.01,
        size: 70+Math.random()*50,
        opacity: 0.1+Math.random()*0.15,
      });
    }
    this.layoutContinents();
    this.cat = new PixelCat(Game.width/2, Game.height/2 + 30);
  }
  onResize() { this.layoutContinents(); if (this.cat) { this.cat.x = Game.width/2; this.cat.y = Game.height/2 + 30; } }
  layoutContinents() {
    const W = Game.width, H = Game.height;
    const cy = H * 0.4;
    const spacing = Math.min(W * 0.22, 200);
    const cx = W / 2;
    this.continents = [
      new Continent({ id:'fire', name:'火之大陸', emoji:'🔥', type:'fire',
        x: cx - spacing*1.5, y: cy, color:'#8d4a1a', accent:'#5a2b0a' }),
      new Continent({ id:'water', name:'水之大陸', emoji:'💧', type:'water',
        x: cx - spacing*0.5, y: cy+30, color:'#1565c0', accent:'#0d47a1' }),
      new Continent({ id:'forest', name:'森林大陸', emoji:'🌿', type:'forest',
        x: cx + spacing*0.5, y: cy+30, color:'#388e3c', accent:'#1b5e20' }),
      new Continent({ id:'ice', name:'冰之大陸', emoji:'❄️', type:'ice',
        x: cx + spacing*1.5, y: cy, color:'#90caf9', accent:'#42a5f5' }),
    ];
  }
  onTap(x, y) {
    if (this.transitioning) return;
    const realX = (x - this.cameraX) / this.cameraScale;
    const realY = (y - this.cameraY) / this.cameraScale;
    for (const c of this.continents) {
      if (c.hitTest(realX, realY)) { this.startZoomTo(c); return; }
    }
  }
  startZoomTo(continent) {
    this.transitioning = true;
    this.zoomTarget = continent;
    const targetScale = 3.5;
    const targetX = Game.width/2 - continent.x * targetScale;
    const targetY = Game.height/2 - continent.y * targetScale;
    this.zoomTween = {
      scale: new Tween(1, targetScale, 1.0, Easing.easeInOutCubic),
      x: new Tween(0, targetX, 1.0, Easing.easeInOutCubic),
      y: new Tween(0, targetY, 1.0, Easing.easeInOutCubic),
      fade: new Tween(0, 1, 1.0, Easing.easeInOutCubic, () => {
        this.enterContinent(continent);
      }),
    };
  }
  enterContinent(continent) {
    if (continent.id === 'fire') {
      Game.changeScene(new FireMapScene());
    } else if (continent.id === 'water') {
      Game.changeScene(new WaterMapScene());
    } else if (continent.id === 'forest') {
      Game.changeScene(new ForestMapScene());
    } else if (continent.id === 'ice') {
      Game.changeScene(new IceMapScene());
    } else {
      // 兜底
      this.message = continent;
      this.messageTimer = 2.5;
      this.resetZoom();
    }
  }
  resetZoom() {
    this.zoomTween = {
      scale: new Tween(this.cameraScale, 1, 0.7, Easing.easeOutCubic),
      x: new Tween(this.cameraX, 0, 0.7, Easing.easeOutCubic),
      y: new Tween(this.cameraY, 0, 0.7, Easing.easeOutCubic),
      fade: new Tween(1, 0, 0.7, Easing.easeOutCubic, () => {
        this.transitioning = false; this.zoomTarget = null;
      }),
    };
  }
  update(dt) {
    this.time += dt;
    for (const c of this.clouds) { c.x += c.speed*dt*5; if (c.x > 1.2) c.x = -0.2; }
    for (const c of this.continents) c.update(dt);
    this.cat.update(dt);
    if (this.zoomTween) {
      this.cameraScale = this.zoomTween.scale.update(dt);
      this.cameraX = this.zoomTween.x.update(dt);
      this.cameraY = this.zoomTween.y.update(dt);
      this.fadeAlpha = this.zoomTween.fade.update(dt);
    }
    if (this.messageTimer > 0) {
      this.messageTimer -= dt;
      if (this.messageTimer <= 0) this.message = null;
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a0a2f'); sky.addColorStop(0.4, '#1a1a4f');
    sky.addColorStop(0.85, '#3a2a5f'); sky.addColorStop(1, '#5a3a6f');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    for (const s of this.stars) {
      const a = 0.4 + Math.sin(this.time*s.speed + s.twinkle) * 0.4;
      ctx.fillStyle = `rgba(255,255,220,${a})`;
      ctx.fillRect(s.x*W, s.y*H, s.size, s.size);
    }
    ctx.fillStyle = 'rgba(255,248,208,0.25)';
    ctx.beginPath(); ctx.arc(W*0.85, H*0.18, 50, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff8d0';
    ctx.beginPath(); ctx.arc(W*0.85, H*0.18, 32, 0, Math.PI*2); ctx.fill();

    for (const c of this.clouds) {
      ctx.fillStyle = `rgba(255,255,255,${c.opacity})`;
      const cx = c.x*W, cy = c.y*H;
      ctx.beginPath();
      ctx.arc(cx, cy, c.size*0.6, 0, Math.PI*2);
      ctx.arc(cx+c.size*0.5, cy, c.size*0.5, 0, Math.PI*2);
      ctx.arc(cx-c.size*0.5, cy, c.size*0.45, 0, Math.PI*2);
      ctx.arc(cx+c.size*0.2, cy-c.size*0.3, c.size*0.4, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(this.cameraX, this.cameraY);
    ctx.scale(this.cameraScale, this.cameraScale);
    for (const c of this.continents) c.draw(ctx);
    this.cat.draw(ctx);
    ctx.restore();

    if (this.cameraScale < 1.3) {
      const ta = 1 - Math.max(0, (this.cameraScale-1)/0.3);
      ctx.save();
      ctx.globalAlpha = ta;
      ctx.fillStyle = '#fff8d0';
      ctx.font = 'bold 32px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 12;
      ctx.fillText('🐱 貓咪的冒險', W/2, 60);
      ctx.font = '14px -apple-system, "PingFang TC"';
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.shadowBlur = 4;
      ctx.fillText('點擊任一大陸開始冒險', W/2, 88);
      ctx.restore();
    }
    if (this.fadeAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.fadeAlpha*0.5})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this.message) {
      const cardW = Math.min(360, W-60), cardH = 110;
      const cx = (W-cardW)/2, cy = (H-cardH)/2;
      ctx.fillStyle = 'rgba(20,20,40,0.92)';
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 18);
      else ctx.rect(cx, cy, cardW, cardH);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 22px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText(`${this.message.emoji} ${this.message.name}`, W/2, cy + 45);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '14px -apple-system, "PingFang TC"';
      ctx.fillText('未來階段開放，敬請期待！', W/2, cy + 75);
    }
  }
}

/* ============================================================
   🔥 火之大陸關卡場景（階段 2 主角）
   ============================================================ */
class FireLevelScene {
  constructor(levelNum) {
    this.name = `Fire L${levelNum}`;
    this.levelNum = levelNum;
    this.time = 0;

    // 場景元素
    this.cat = null;
    this.lavaParticles = [];     // 岩漿冒泡
    this.smokeParticles = [];    // 火山煙
    this.emberParticles = [];    // 飛濺火星
    this.successParticles = [];  // 過關星星

    // 道具系統
    this.items = [
      { id: 'wood', icon: '🪵', name: '木橋', x: 0, y: 0, used: false, hover: false },
      { id: 'rock', icon: '🪨', name: '大石頭', x: 0, y: 0, used: false, hover: false },
      { id: 'water', icon: '💧', name: '水桶', x: 0, y: 0, used: false, hover: false },
    ];
    this.selectedItem = null;

    // 岩漿河
    this.lavaState = 'normal';   // normal / wood-burning / rock-sinking / cooling / bridged
    this.bridgeAlpha = 0;
    this.lavaCooling = 0;        // 0~1，水變黑曜石的進度
    this.feedbackText = null;
    this.feedbackTimer = 0;
    this.feedbackColor = '#fff';

    // 過關
    this.cleared = false;
    this.catWalking = false;
    this.catWalkTween = null;
    this.showHintCard = false;
    this.showWinCard = false;

    // 失敗動畫
    this.failingItem = null;     // 'wood' / 'rock'
    this.failTime = 0;

    // 進場 fade
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);

    // 返回按鈕
    this.backBtn = { x: 50, y: 30, r: 22 };
  }

  enter() {
    this.layout();
    this.cat = new PixelCat(this.catStartX, this.groundY);
    this.cat.scale = 3;

    // 岩漿初始粒子
    for (let i = 0; i < 30; i++) {
      this.lavaParticles.push({
        x: Math.random(),
        y: Math.random(),
        size: 1 + Math.random() * 2.5,
        speed: 0.3 + Math.random() * 0.4,
        offset: Math.random() * Math.PI * 2,
      });
    }
    for (let i = 0; i < 15; i++) {
      this.smokeParticles.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height*0.5,
        size: 30+Math.random()*40, speed: 10+Math.random()*15,
        alpha: 0.05+Math.random()*0.08,
      });
    }
    for (let i = 0; i < 25; i++) {
      this.emberParticles.push({
        x: Math.random()*Game.width,
        y: Game.height + Math.random()*100,
        vy: -30-Math.random()*40,
        life: Math.random(),
        size: 1+Math.random()*2,
      });
    }
  }

  layout() {
    const W = Game.width, H = Game.height;
    this.groundY = H * 0.7;
    this.lavaLeft = W * 0.32;
    this.lavaRight = W * 0.68;
    this.catStartX = W * 0.18;
    this.catTargetX = W * 0.82;

    // 道具放在底部
    const itemY = H - 80;
    const totalW = Math.min(W * 0.6, 360);
    const startX = (W - totalW) / 2;
    const step = totalW / 2;
    this.items.forEach((it, i) => {
      it.x = startX + i * step;
      it.y = itemY;
      it.r = 38;
    });
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }

  onTap(x, y) {
    // 返回按鈕
    const dx = x - this.backBtn.x, dy = y - this.backBtn.y;
    if (dx*dx + dy*dy < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new FireMapScene());
      return;
    }

    // 過關卡片：再點任意處 → 回火之大陸地圖
    if (this.showWinCard) {
      Game.changeScene(new FireMapScene());
      return;
    }
    // 提示小卡關閉
    if (this.showHintCard) {
      this.showHintCard = false;
      return;
    }

    if (this.cleared || this.catWalking) return;

    // 點道具
    for (const it of this.items) {
      if (it.used) continue;
      const ddx = x - it.x, ddy = y - it.y;
      if (ddx*ddx + ddy*ddy < it.r*it.r) {
        this.useItem(it);
        return;
      }
    }
  }

  useItem(item) {
    item.used = true;

    if (item.id === 'wood') {
      this.lavaState = 'wood-burning';
      this.failingItem = 'wood';
      this.failTime = 0;
      this.showFeedback('🔥 木橋被燒掉了！再試試別的吧～', '#ff7043');
      setTimeout(() => {
        item.used = false;  // 把木橋還給玩家
        this.lavaState = 'normal';
        this.failingItem = null;
      }, 2200);
    }
    else if (item.id === 'rock') {
      this.lavaState = 'rock-sinking';
      this.failingItem = 'rock';
      this.failTime = 0;
      this.showFeedback('💦 石頭沉下去了！再想想～', '#ffb74d');
      setTimeout(() => {
        item.used = false;
        this.lavaState = 'normal';
        this.failingItem = null;
      }, 2200);
    }
    else if (item.id === 'water') {
      this.lavaState = 'cooling';
      this.showFeedback('✨ 岩漿在冷卻... 變成黑曜石了！', '#4fc3f7');
      // 1.2 秒後變橋
      this.coolingTween = new Tween(0, 1, 1.2, Easing.easeInOutCubic, () => {
        this.lavaState = 'bridged';
        this.bridgeAlpha = 1;
        // 虎紋貓開始走
        setTimeout(() => this.startWalk(), 400);
      });
    }
  }

  startWalk() {
    this.catWalking = true;
    this.cat.setState('walk');
    this.catWalkTween = new Tween(this.catStartX, this.catTargetX, 2.0, Easing.easeInOutCubic, () => {
      this.cat.setState('cheer');
      this.cleared = true;
      this.catWalking = false;
      // 觸發過關
      Game.progress.fireLevel = Math.max(Game.progress.fireLevel || 0, 1);
      Game.progress.fire = (Game.progress.fireLevel >= 2);
      Game.saveProgress();
      // 慶祝粒子
      this.spawnSuccessParticles();
      setTimeout(() => {
        if (Game.parentMode) {
          this.showHintCard = true;
        } else {
          this.showWinCard = true;
        }
      }, 1200);
    });
  }

  spawnSuccessParticles() {
    for (let i = 0; i < 40; i++) {
      this.successParticles.push({
        x: this.cat.x,
        y: this.cat.y - 60,
        vx: (Math.random()-0.5) * 200,
        vy: -100 - Math.random()*150,
        life: 0,
        maxLife: 1.2 + Math.random()*0.6,
        color: ['#ffd700', '#ffeb3b', '#ff5252', '#4fc3f7', '#fff'][Math.floor(Math.random()*5)],
        size: 2 + Math.random()*2,
      });
    }
  }

  showFeedback(text, color) {
    this.feedbackText = text;
    this.feedbackColor = color;
    this.feedbackTimer = 2.5;
  }

  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);

    // 岩漿冷卻動畫
    if (this.coolingTween && !this.coolingTween.done) {
      this.lavaCooling = this.coolingTween.update(dt);
    }

    // 失敗動畫計時
    if (this.failingItem) this.failTime += dt;

    // 虎紋貓走路
    if (this.catWalkTween && !this.catWalkTween.done) {
      this.cat.x = this.catWalkTween.update(dt);
    }

    // 煙
    for (const s of this.smokeParticles) {
      s.x += s.speed * dt;
      s.y -= s.speed * dt * 0.5;
      if (s.y < -50 || s.x > Game.width+100) {
        s.x = -50; s.y = Game.height*0.5 + Math.random()*100;
      }
    }
    // 飛濺火星
    for (const e of this.emberParticles) {
      e.life += dt * 0.5;
      e.y += e.vy * dt;
      if (e.life > 1 || e.y < 0) {
        e.life = 0;
        e.x = Math.random() * Game.width;
        e.y = Game.height + 20;
      }
    }
    // 慶祝粒子
    for (const p of this.successParticles) {
      p.life += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt; // 重力
    }
    this.successParticles = this.successParticles.filter(p => p.life < p.maxLife);

    // 提示文字倒數
    if (this.feedbackTimer > 0) {
      this.feedbackTimer -= dt;
      if (this.feedbackTimer <= 0) this.feedbackText = null;
    }
  }

  draw(ctx) {
    const W = Game.width, H = Game.height;

    // 🔥 火紅天空
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a0a05');
    sky.addColorStop(0.4, '#5a1810');
    sky.addColorStop(0.7, '#a02810');
    sky.addColorStop(1, '#3a0a05');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 🌫️ 遠方煙
    for (const s of this.smokeParticles) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      g.addColorStop(0, `rgba(60,30,20,${s.alpha})`);
      g.addColorStop(1, 'rgba(60,30,20,0)');
      ctx.fillStyle = g;
      ctx.fillRect(s.x-s.size, s.y-s.size, s.size*2, s.size*2);
    }

    // 🌋 遠山剪影
    ctx.fillStyle = '#2a0a05';
    ctx.beginPath();
    ctx.moveTo(0, H*0.55);
    ctx.lineTo(W*0.15, H*0.4);
    ctx.lineTo(W*0.3, H*0.5);
    ctx.lineTo(W*0.5, H*0.35);
    ctx.lineTo(W*0.7, H*0.45);
    ctx.lineTo(W*0.85, H*0.38);
    ctx.lineTo(W, H*0.5);
    ctx.lineTo(W, H*0.7); ctx.lineTo(0, H*0.7);
    ctx.closePath();
    ctx.fill();

    // 🪨 地面（左側）
    const groundLeft = ctx.createLinearGradient(0, this.groundY, 0, H);
    groundLeft.addColorStop(0, '#5a2a18');
    groundLeft.addColorStop(1, '#2a0a05');
    ctx.fillStyle = groundLeft;
    ctx.fillRect(0, this.groundY, this.lavaLeft, H - this.groundY);
    // 地面石頭裝飾
    ctx.fillStyle = '#3a1810';
    ctx.fillRect(40, this.groundY+12, 18, 8);
    ctx.fillRect(120, this.groundY+22, 10, 6);
    ctx.fillRect(200, this.groundY+15, 14, 7);

    // 🪨 地面（右側）
    ctx.fillStyle = groundLeft;
    ctx.fillRect(this.lavaRight, this.groundY, W - this.lavaRight, H - this.groundY);
    ctx.fillStyle = '#3a1810';
    ctx.fillRect(this.lavaRight + 30, this.groundY+15, 14, 7);
    ctx.fillRect(this.lavaRight + 90, this.groundY+25, 18, 6);

    // 目標旗子（右側）
    const flagX = W - 80;
    const flagY = this.groundY - 50;
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(flagX, flagY, 3, 50);
    const flagWave = Math.sin(this.time * 3) * 4;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(flagX+3, flagY);
    ctx.lineTo(flagX+30+flagWave, flagY+8);
    ctx.lineTo(flagX+3, flagY+18);
    ctx.closePath();
    ctx.fill();
    if (this.cleared) {
      ctx.fillStyle = `rgba(255,215,0,${0.3+Math.sin(this.time*4)*0.2})`;
      ctx.beginPath();
      ctx.arc(flagX+10, flagY+8, 25, 0, Math.PI*2);
      ctx.fill();
    }

    // 🌋 岩漿河
    this.drawLava(ctx);

    // 🐱 虎紋貓
    if (this.cat) this.cat.draw(ctx);

    // ✈️ 飛濺火星（前景）
    for (const e of this.emberParticles) {
      const a = (1 - e.life) * 0.8;
      ctx.fillStyle = `rgba(255, ${100+e.life*100}, 30, ${a})`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }

    // 🎉 慶祝粒子
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;

    // 🛠️ 道具列
    this.drawItems(ctx);

    // 🏷️ 關卡標題
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 130, 16, 260, 36);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(`🔥 火之大陸 — 第 ${this.levelNum} 關`, W/2, 40);
    ctx.restore();

    // ⬅️ 返回按鈕
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    // 💬 提示文字
    if (this.feedbackText) {
      const a = Math.min(1, this.feedbackTimer / 0.4);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      const tw = ctx.measureText(this.feedbackText).width;
      ctx.fillRect(W/2 - 200, 70, 400, 36);
      ctx.fillStyle = this.feedbackColor;
      ctx.font = 'bold 16px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText(this.feedbackText, W/2, 92);
      ctx.restore();
    } else if (!this.cleared && !this.catWalking) {
      // 開頭提示
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '14px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText('🐱 怎麼讓虎紋貓過河？點選下方道具試試看', W/2, 75);
      ctx.restore();
    }

    // 💡 家長模式提示卡
    if (this.showHintCard) this.drawHintCard(ctx);
    // 🏆 過關卡片
    if (this.showWinCard) this.drawWinCard(ctx);

    // 進場淡入
    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  drawLava(ctx) {
    const W = Game.width, H = Game.height;
    const lx = this.lavaLeft, rx = this.lavaRight;
    const ly = this.groundY;
    const lh = H - ly;

    // 木橋燒掉中
    if (this.lavaState === 'wood-burning') {
      // 先畫橋（灰燼漸變）
      const burn = Math.min(this.failTime / 2.0, 1);
      ctx.fillStyle = '#5d4037';
      ctx.globalAlpha = 1 - burn;
      ctx.fillRect(lx-10, ly-12, (rx-lx)+20, 14);
      ctx.globalAlpha = 1;
      // 火焰特效
      for (let i = 0; i < 12; i++) {
        const fx = lx + (rx-lx) * (i/11);
        const fh = 30 + Math.sin(this.time*8 + i) * 10;
        const grad = ctx.createLinearGradient(fx, ly-fh, fx, ly);
        grad.addColorStop(0, 'rgba(255,235,59,0.8)');
        grad.addColorStop(0.5, 'rgba(255,87,34,0.7)');
        grad.addColorStop(1, 'rgba(244,67,54,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(fx-4, ly-fh-burn*5, 8, fh);
      }
    }

    // 岩漿主體
    let lavaTopColor, lavaMidColor, lavaBotColor;
    if (this.lavaState === 'cooling' || this.lavaState === 'bridged') {
      const c = this.lavaCooling;
      lavaTopColor = `rgba(${Math.floor(255-205*c)}, ${Math.floor(160-150*c)}, ${Math.floor(50+10*c)}, 1)`;
      lavaMidColor = `rgba(${Math.floor(244-200*c)}, ${Math.floor(67-60*c)}, ${Math.floor(54-40*c)}, 1)`;
      lavaBotColor = `rgba(${Math.floor(120-100*c)}, ${Math.floor(20-15*c)}, ${Math.floor(15-10*c)}, 1)`;
    } else {
      lavaTopColor = '#ffa726'; lavaMidColor = '#f44336'; lavaBotColor = '#7a1410';
    }

    const grad = ctx.createLinearGradient(0, ly, 0, H);
    grad.addColorStop(0, lavaTopColor);
    grad.addColorStop(0.5, lavaMidColor);
    grad.addColorStop(1, lavaBotColor);
    ctx.fillStyle = grad;

    // 岩漿表面有起伏
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    const steps = 30;
    for (let i = 0; i <= steps; i++) {
      const t = i/steps;
      const px = lx + (rx-lx) * t;
      const wave = (this.lavaState === 'bridged') ? 0 : Math.sin(this.time*3 + t*8) * 4 + Math.sin(this.time*5 + t*4) * 2;
      ctx.lineTo(px, ly + wave);
    }
    ctx.lineTo(rx, H); ctx.lineTo(lx, H);
    ctx.closePath();
    ctx.fill();

    // 岩漿冒泡
    if (this.lavaState !== 'bridged') {
      for (const p of this.lavaParticles) {
        const px = lx + (rx-lx) * p.x;
        const py = ly + 5 + Math.sin(this.time*p.speed + p.offset) * 8 + p.y * 30;
        const a = (this.lavaState === 'cooling') ? Math.max(0, 1 - this.lavaCooling) : 0.8;
        ctx.fillStyle = `rgba(255, 235, 59, ${a})`;
        ctx.fillRect(px, py, p.size, p.size);
      }
    }

    // 石頭沉沒
    if (this.lavaState === 'rock-sinking') {
      const sink = Math.min(this.failTime / 1.5, 1);
      ctx.fillStyle = '#5a4a40';
      const rockY = ly + sink * 30;
      ctx.beginPath();
      ctx.arc((lx+rx)/2, rockY, 18 - sink*5, 0, Math.PI*2);
      ctx.fill();
      // 沉沒水波
      ctx.strokeStyle = `rgba(255,200,100,${0.6*(1-sink)})`;
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc((lx+rx)/2, ly+2, 15 + i*15 + this.failTime*30, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // 黑曜石橋
    if (this.lavaState === 'bridged' || this.lavaState === 'cooling') {
      const a = this.lavaCooling;
      ctx.fillStyle = `rgba(40, 20, 50, ${a})`;
      ctx.fillRect(lx, ly - 4, rx-lx, 12);
      // 黑曜石高光
      ctx.fillStyle = `rgba(150, 100, 200, ${a * 0.3})`;
      ctx.fillRect(lx + 10, ly - 3, (rx-lx) - 20, 2);
      // 邊緣
      ctx.fillStyle = `rgba(80, 40, 90, ${a})`;
      ctx.fillRect(lx, ly - 4, rx-lx, 2);
      ctx.fillRect(lx, ly + 6, rx-lx, 2);
    }

    // 岩漿邊緣熱光
    if (this.lavaState !== 'bridged') {
      const heatGrad = ctx.createLinearGradient(0, ly-30, 0, ly);
      heatGrad.addColorStop(0, 'rgba(255,150,50,0)');
      heatGrad.addColorStop(1, `rgba(255,150,50,${0.3*(1-this.lavaCooling)})`);
      ctx.fillStyle = heatGrad;
      ctx.fillRect(lx, ly-30, rx-lx, 30);
    }
  }

  drawItems(ctx) {
    const W = Game.width, H = Game.height;
    // 背景條
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, H-110, W, 110);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(0, H-110, W, 1);

    for (const it of this.items) {
      const wobble = it.used ? 0 : Math.sin(this.time*2 + it.x*0.01) * 2;

      // 圓底
      ctx.fillStyle = it.used ? 'rgba(50,50,50,0.4)' : 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.arc(it.x, it.y + wobble, it.r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = it.used ? 'rgba(100,100,100,0.3)' : 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 圖示
      ctx.font = '36px -apple-system';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = it.used ? 0.3 : 1;
      ctx.fillText(it.icon, it.x, it.y + wobble);
      ctx.globalAlpha = 1;
      ctx.textBaseline = 'alphabetic';

      // 名字
      ctx.fillStyle = it.used ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.85)';
      ctx.font = '12px -apple-system, "PingFang TC"';
      ctx.fillText(it.name, it.x, it.y + it.r + 16 + wobble);
    }
  }

  drawHintCard(ctx) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);

    const cardW = Math.min(420, W - 40);
    const cardH = 280;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;

    // 卡片
    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#1a3a5a');
    grad.addColorStop(1, '#0a1a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();

    // 標題
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('💡 你發現了什麼？', W/2, cy + 40);

    // 內容
    ctx.fillStyle = '#fff';
    ctx.font = '15px -apple-system, "PingFang TC"';
    const lines = [
      '🔥 岩漿是「很燙的石頭」',
      '💧 水可以讓岩漿冷卻',
      '🪨 冷卻後變成黑色的「黑曜石」',
      '',
      '✨ 真實世界的火山熔岩',
      '遇到海水也會這樣變成黑曜石！',
    ];
    lines.forEach((line, i) => {
      ctx.fillStyle = i < 3 ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(line, W/2, cy + 80 + i*26);
    });

    // 下一步按鈕
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px -apple-system, "PingFang TC"';
    ctx.fillText('（點任意處繼續）', W/2, cy + cardH - 25);
  }

  drawWinCard(ctx) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);

    const cardW = Math.min(360, W - 40);
    const cardH = 200;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;

    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#3a1a5a');
    grad.addColorStop(1, '#1a0a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();

    // 慶祝表情
    const bounce = Math.abs(Math.sin(this.time*4)) * 6;
    ctx.font = '52px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('🎉', W/2, cy + 70 - bounce);

    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 24px -apple-system, "PingFang TC"';
    ctx.fillText('過關了！', W/2, cy + 110);

    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '14px -apple-system, "PingFang TC"';
    ctx.fillText('🌫️ 火之大陸的霧消散了', W/2, cy + 140);

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px -apple-system, "PingFang TC"';
    ctx.fillText('（點任意處回到火之大陸地圖）', W/2, cy + cardH - 20);
  }
}

/* ============================================================
   🗺️ 火之大陸地圖（關卡選擇）
   ============================================================ */
class FireMapScene {
  constructor() {
    this.name = 'FireMap';
    this.time = 0;
    this.lavaParticles = [];
    this.smokeParticles = [];
    this.emberParticles = [];
    this.cat = null;
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);
    this.backBtn = { x: 50, y: 30, r: 22 };
    this.levels = [];   // 關卡按鈕
  }
  enter() {
    this.layout();
    this.cat = new PixelCat(Game.width * 0.5, Game.height * 0.85);
    this.cat.scale = 2;
    for (let i = 0; i < 20; i++) {
      this.smokeParticles.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height*0.5,
        size: 30+Math.random()*40, speed: 10+Math.random()*15,
        alpha: 0.05+Math.random()*0.08,
      });
    }
    for (let i = 0; i < 30; i++) {
      this.emberParticles.push({
        x: Math.random()*Game.width,
        y: Game.height + Math.random()*100,
        vy: -30-Math.random()*40,
        life: Math.random(),
        size: 1+Math.random()*2,
      });
    }
  }
  onResize() { this.layout(); }
  layout() {
    const W = Game.width, H = Game.height;
    // 6 個關卡圖示，沿著「冒險路徑」放（之字形上山到火山口）
    const fireLv = Game.progress.fireLevel || 0;
    this.levels = [
      { num: 1, name: '岩漿河',   x: W*0.18, y: H*0.62, cleared: fireLv>=1, unlocked: true,        r: 36 },
      { num: 2, name: '火焰封印', x: W*0.34, y: H*0.50, cleared: fireLv>=2, unlocked: fireLv>=1,   r: 36 },
      { num: 3, name: '火炬之路', x: W*0.50, y: H*0.58, cleared: fireLv>=3, unlocked: fireLv>=2,   r: 36 },
      { num: 4, name: '火龍蛋',   x: W*0.66, y: H*0.46, cleared: fireLv>=4, unlocked: fireLv>=3,   r: 36 },
      { num: 5, name: '鎖鏈火球', x: W*0.82, y: H*0.55, cleared: fireLv>=5, unlocked: fireLv>=4,   r: 36 },
      { num: 6, name: '🐲 烈焰魔王', x: W*0.65, y: H*0.30, cleared: fireLv>=6, unlocked: fireLv>=5, r: 44, isBoss: true },
    ];
  }
  onTap(x, y) {
    // 返回鈕
    const bx = x - this.backBtn.x, by = y - this.backBtn.y;
    if (bx*bx + by*by < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new WorldMapScene()); return;
    }
    for (const lv of this.levels) {
      if (!lv.unlocked) continue;
      const dx = x - lv.x, dy = y - lv.y;
      if (dx*dx + dy*dy < lv.r*lv.r) {
        if (lv.num === 1) Game.changeScene(new FireLevelScene(1));
        else if (lv.num === 2) Game.changeScene(new FireLevel2Scene());
        else if (lv.num === 3) Game.changeScene(new FireLevel3Scene());
        else if (lv.num === 4) Game.changeScene(new FireLevel4Scene());
        else if (lv.num === 5) Game.changeScene(new FireLevel5Scene());
        else if (lv.num === 6) Game.changeScene(new FireBossScene());
        return;
      }
    }
  }
  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);
    for (const s of this.smokeParticles) {
      s.x += s.speed * dt;
      s.y -= s.speed * dt * 0.5;
      if (s.y < -50 || s.x > Game.width+100) {
        s.x = -50; s.y = Game.height*0.5 + Math.random()*100;
      }
    }
    for (const e of this.emberParticles) {
      e.life += dt * 0.5;
      e.y += e.vy * dt;
      if (e.life > 1 || e.y < 0) {
        e.life = 0; e.x = Math.random() * Game.width;
        e.y = Game.height + 20;
      }
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    // 火紅天空
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a0a05'); sky.addColorStop(0.4, '#5a1810');
    sky.addColorStop(0.7, '#a02810'); sky.addColorStop(1, '#3a0a05');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // 煙
    for (const s of this.smokeParticles) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      g.addColorStop(0, `rgba(60,30,20,${s.alpha})`);
      g.addColorStop(1, 'rgba(60,30,20,0)');
      ctx.fillStyle = g;
      ctx.fillRect(s.x-s.size, s.y-s.size, s.size*2, s.size*2);
    }
    // 遠山+火山
    ctx.fillStyle = '#2a0a05';
    ctx.beginPath();
    ctx.moveTo(0, H*0.5); ctx.lineTo(W*0.2, H*0.3);
    ctx.lineTo(W*0.4, H*0.45); ctx.lineTo(W*0.6, H*0.25);
    ctx.lineTo(W*0.8, H*0.4); ctx.lineTo(W, H*0.35);
    ctx.lineTo(W, H*0.7); ctx.lineTo(0, H*0.7);
    ctx.closePath(); ctx.fill();
    // 火山口（中間那座）
    ctx.fillStyle = '#ff5722';
    ctx.beginPath();
    ctx.ellipse(W*0.6, H*0.255, 12, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.ellipse(W*0.6, H*0.252, 6, 2, 0, 0, Math.PI*2); ctx.fill();

    // 地面
    const gd = ctx.createLinearGradient(0, H*0.7, 0, H);
    gd.addColorStop(0, '#5a2a18'); gd.addColorStop(1, '#2a0a05');
    ctx.fillStyle = gd;
    ctx.fillRect(0, H*0.7, W, H*0.3);

    // 蜿蜒路徑（連接 6 個關卡的虛線）
    ctx.strokeStyle = 'rgba(255,200,100,0.4)';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(this.cat.x, this.cat.y - 30);
    for (let i = 0; i < this.levels.length; i++) {
      const lv = this.levels[i];
      if (i === 0) {
        ctx.lineTo(lv.x, lv.y);
      } else {
        const prev = this.levels[i-1];
        const mx = (prev.x + lv.x) / 2;
        const my = (prev.y + lv.y) / 2 + (i % 2 === 0 ? 30 : -30);
        ctx.quadraticCurveTo(mx, my, lv.x, lv.y);
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // 關卡圖示
    for (const lv of this.levels) {
      const bob = Math.sin(this.time*2 + lv.num) * 4;
      const cy = lv.y + bob;
      // 光暈
      if (lv.unlocked && !lv.cleared) {
        const glowColor = lv.isBoss ? '155, 81, 255' : '255, 235, 59';
        ctx.fillStyle = `rgba(${glowColor},${0.25+Math.sin(this.time*3+lv.num)*0.2})`;
        ctx.beginPath(); ctx.arc(lv.x, cy, lv.r+18, 0, Math.PI*2); ctx.fill();
      }
      // 圓底
      const grad = ctx.createRadialGradient(lv.x, cy, 0, lv.x, cy, lv.r);
      if (lv.cleared) {
        grad.addColorStop(0, '#ffd700'); grad.addColorStop(1, '#b8860b');
      } else if (lv.isBoss && lv.unlocked) {
        grad.addColorStop(0, '#9b51e0'); grad.addColorStop(1, '#4a148c');
      } else if (lv.unlocked) {
        grad.addColorStop(0, '#ff6f43'); grad.addColorStop(1, '#8d2818');
      } else {
        grad.addColorStop(0, '#3a2018'); grad.addColorStop(1, '#1a0a05');
      }
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(lv.x, cy, lv.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = lv.cleared ? '#fff8d0'
        : (lv.isBoss && lv.unlocked) ? '#ce93d8'
        : (lv.unlocked ? '#ffeb3b' : '#5a3a30');
      ctx.lineWidth = 3;
      ctx.stroke();

      // 關卡編號 / 鎖
      ctx.fillStyle = lv.unlocked ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 28px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(lv.unlocked ? `${lv.num}` : '🔒', lv.x, cy);
      ctx.textBaseline = 'alphabetic';

      // 關卡名
      ctx.fillStyle = lv.unlocked ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.3)';
      ctx.font = '13px -apple-system, "PingFang TC"';
      ctx.fillText(lv.name, lv.x, cy + lv.r + 22);
      // 已過關打勾
      if (lv.cleared) {
        ctx.fillStyle = '#4caf50';
        ctx.beginPath(); ctx.arc(lv.x+lv.r-8, cy-lv.r+8, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px -apple-system';
        ctx.textBaseline = 'middle';
        ctx.fillText('✓', lv.x+lv.r-8, cy-lv.r+9);
        ctx.textBaseline = 'alphabetic';
      }
    }

    // 虎紋貓
    if (this.cat) this.cat.draw(ctx);

    // 火星
    for (const e of this.emberParticles) {
      const a = (1 - e.life) * 0.8;
      ctx.fillStyle = `rgba(255, ${100+e.life*100}, 30, ${a})`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }

    // 標題
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 110, 16, 220, 36);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('🔥 火之大陸 — 選擇關卡', W/2, 40);

    // 進度
    const fireLv = Game.progress.fireLevel || 0;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px -apple-system, "PingFang TC"';
    ctx.fillText(`進度：${fireLv} / 6 關`, W/2, 70);

    // 返回鈕
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    // 進場淡入
    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ============================================================
   🔥 火之大陸第 2 關：火焰封印門（兩步驟解謎）
   ============================================================ */
class FireLevel2Scene {
  constructor() {
    this.name = 'Fire L2';
    this.time = 0;
    this.cat = null;
    this.smokeParticles = [];
    this.emberParticles = [];
    this.successParticles = [];

    // 兩階段謎題狀態
    this.puzzleStep = 1;          // 1: 火很強  2: 火變弱  3: 已解開
    this.fireIntensity = 1.0;     // 1.0 = 滿火力, 0.4 = 變弱, 0 = 熄滅
    this.intensityTween = null;
    this.flameFlash = 0;          // 風箱失敗時火焰瞬間放大
    this.steamAlpha = 0;          // 水蒸發特效
    this.steamTween = null;

    // 道具：4 個（順序刻意打散，避免直覺按第一個）
    this.items = [
      { id: 'rock',  icon: '🪨', name: '石頭',  used: false, x: 0, y: 0 },
      { id: 'water', icon: '💧', name: '水桶',  used: false, x: 0, y: 0 },
      { id: 'ice',   icon: '❄️', name: '冰塊',  used: false, x: 0, y: 0 },
      { id: 'wind',  icon: '🌬️', name: '風箱',  used: false, x: 0, y: 0 },
    ];

    this.feedbackText = null;
    this.feedbackTimer = 0;
    this.feedbackColor = '#fff';

    this.cleared = false;
    this.catWalking = false;
    this.catWalkTween = null;
    this.doorOpening = 0;          // 0~1
    this.doorTween = null;
    this.showHintCard = false;
    this.showWinCard = false;

    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);

    this.backBtn = { x: 50, y: 30, r: 22 };
  }

  enter() {
    this.layout();
    this.cat = new PixelCat(this.catStartX, this.groundY);
    this.cat.scale = 3;
    for (let i = 0; i < 15; i++) {
      this.smokeParticles.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height*0.4,
        size: 30+Math.random()*40, speed: 10+Math.random()*15,
        alpha: 0.05+Math.random()*0.08,
      });
    }
    for (let i = 0; i < 25; i++) {
      this.emberParticles.push({
        x: Math.random()*Game.width,
        y: Game.height + Math.random()*100,
        vy: -30-Math.random()*40,
        life: Math.random(), size: 1+Math.random()*2,
      });
    }
  }

  layout() {
    const W = Game.width, H = Game.height;
    this.groundY = H * 0.7;
    this.fireX = W * 0.55;
    this.doorX = W * 0.78;
    this.catStartX = W * 0.18;
    this.catTargetX = W * 0.78;

    const itemY = H - 80;
    const totalW = Math.min(W * 0.75, 480);
    const startX = (W - totalW) / 2;
    const step = totalW / 3;
    this.items.forEach((it, i) => {
      it.x = startX + i * step;
      it.y = itemY;
      it.r = 36;
    });
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }

  onTap(x, y) {
    const bx = x - this.backBtn.x, by = y - this.backBtn.y;
    if (bx*bx + by*by < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new FireMapScene()); return;
    }
    if (this.showWinCard) { Game.changeScene(new FireMapScene()); return; }
    if (this.showHintCard) { this.showHintCard = false; return; }
    if (this.cleared || this.catWalking) return;

    for (const it of this.items) {
      if (it.used) continue;
      const dx = x - it.x, dy = y - it.y;
      if (dx*dx + dy*dy < it.r*it.r) { this.useItem(it); return; }
    }
  }

  useItem(item) {
    // 步驟 1：火很強
    if (this.puzzleStep === 1) {
      if (item.id === 'ice') {
        // ✅ 正解：火變弱
        item.used = true;
        this.showFeedback('❄️ 冰降低了火的溫度，火變弱了！', '#4fc3f7');
        this.intensityTween = new Tween(1.0, 0.4, 1.0, Easing.easeOutCubic, () => {
          this.puzzleStep = 2;
        });
      }
      else if (item.id === 'wind') {
        // ❌ 火被吹得更旺
        this.showFeedback('💨 風讓火更旺了！火太強，先要降溫～', '#ff7043');
        this.flameFlash = 1.0;
      }
      else if (item.id === 'water') {
        // ❌ 水蒸發
        this.showFeedback('💨 水都蒸發了！火太強，水沒辦法滅～', '#ffb74d');
        this.steamAlpha = 1.0;
        this.steamTween = new Tween(1.0, 0, 1.5, Easing.easeOutCubic);
      }
      else if (item.id === 'rock') {
        this.showFeedback('🔥 石頭被燒紅了！這個沒用～', '#ff7043');
      }
    }
    // 步驟 2：火變弱了
    else if (this.puzzleStep === 2) {
      if (item.id === 'wind') {
        // ✅ 正解：吹熄
        item.used = true;
        this.showFeedback('🌬️ 風吹散了殘火，門打開了！', '#81c784');
        this.intensityTween = new Tween(0.4, 0, 0.8, Easing.easeOutCubic, () => {
          this.puzzleStep = 3;
          // 開門動畫
          this.doorTween = new Tween(0, 1, 0.8, Easing.easeOutCubic, () => {
            setTimeout(() => this.startWalk(), 300);
          });
        });
      }
      else if (item.id === 'ice') {
        this.showFeedback('❄️ 火已經很弱了，需要不一樣的方法～', '#4fc3f7');
      }
      else if (item.id === 'water') {
        this.showFeedback('💧 火太小，水會變成小水窪～試試別的', '#ffb74d');
      }
      else if (item.id === 'rock') {
        this.showFeedback('🪨 石頭還是沒用啦！', '#ff7043');
      }
    }
  }

  startWalk() {
    this.catWalking = true;
    this.cat.setState('walk');
    this.catWalkTween = new Tween(this.catStartX, this.catTargetX, 2.0, Easing.easeInOutCubic, () => {
      this.cat.setState('cheer');
      this.cleared = true;
      this.catWalking = false;
      Game.progress.fireLevel = Math.max(Game.progress.fireLevel || 0, 2);
      Game.progress.fire = (Game.progress.fireLevel >= 2);
      Game.saveProgress();
      this.spawnSuccessParticles();
      setTimeout(() => {
        if (Game.parentMode) this.showHintCard = true;
        else this.showWinCard = true;
      }, 1200);
    });
  }

  spawnSuccessParticles() {
    for (let i = 0; i < 50; i++) {
      this.successParticles.push({
        x: this.cat.x, y: this.cat.y - 60,
        vx: (Math.random()-0.5) * 240,
        vy: -120 - Math.random()*180,
        life: 0, maxLife: 1.4 + Math.random()*0.6,
        color: ['#ffd700', '#ffeb3b', '#ff5252', '#4fc3f7', '#fff', '#81c784'][Math.floor(Math.random()*6)],
        size: 2 + Math.random()*2,
      });
    }
  }

  showFeedback(text, color) {
    this.feedbackText = text; this.feedbackColor = color; this.feedbackTimer = 2.5;
  }

  update(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);

    if (this.intensityTween && !this.intensityTween.done) {
      this.fireIntensity = this.intensityTween.update(dt);
    }
    if (this.steamTween && !this.steamTween.done) {
      this.steamAlpha = this.steamTween.update(dt);
    }
    if (this.doorTween && !this.doorTween.done) {
      this.doorOpening = this.doorTween.update(dt);
    }
    // 風箱失敗火焰閃爍衰減
    if (this.flameFlash > 0) this.flameFlash = Math.max(0, this.flameFlash - dt * 1.2);

    if (this.catWalkTween && !this.catWalkTween.done) {
      this.cat.x = this.catWalkTween.update(dt);
    }

    for (const s of this.smokeParticles) {
      s.x += s.speed * dt; s.y -= s.speed * dt * 0.5;
      if (s.y < -50 || s.x > Game.width+100) {
        s.x = -50; s.y = Game.height*0.5 + Math.random()*100;
      }
    }
    for (const e of this.emberParticles) {
      e.life += dt * 0.5; e.y += e.vy * dt;
      if (e.life > 1 || e.y < 0) {
        e.life = 0; e.x = Math.random() * Game.width;
        e.y = Game.height + 20;
      }
    }
    for (const p of this.successParticles) {
      p.life += dt; p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 200 * dt;
    }
    this.successParticles = this.successParticles.filter(p => p.life < p.maxLife);

    if (this.feedbackTimer > 0) {
      this.feedbackTimer -= dt;
      if (this.feedbackTimer <= 0) this.feedbackText = null;
    }
  }

  draw(ctx) {
    const W = Game.width, H = Game.height;

    // 火紅天空
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a0a05'); sky.addColorStop(0.4, '#3a1010');
    sky.addColorStop(0.7, '#7a2010'); sky.addColorStop(1, '#1a0a05');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

    // 煙
    for (const s of this.smokeParticles) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      g.addColorStop(0, `rgba(40,20,15,${s.alpha})`);
      g.addColorStop(1, 'rgba(40,20,15,0)');
      ctx.fillStyle = g;
      ctx.fillRect(s.x-s.size, s.y-s.size, s.size*2, s.size*2);
    }

    // 洞穴頂部（弧形剪影）
    ctx.fillStyle = '#1a0a05';
    ctx.beginPath();
    ctx.moveTo(0, 0); ctx.lineTo(W, 0);
    ctx.lineTo(W, H*0.15);
    ctx.quadraticCurveTo(W*0.5, H*0.45, 0, H*0.15);
    ctx.closePath(); ctx.fill();
    // 洞穴鐘乳石
    ctx.fillStyle = '#0a0502';
    for (let i = 0; i < 6; i++) {
      const sx = W * (0.1 + i * 0.15);
      const sh = 30 + Math.sin(i*1.7) * 20;
      ctx.beginPath();
      ctx.moveTo(sx-8, H*0.18);
      ctx.lineTo(sx, H*0.18 + sh);
      ctx.lineTo(sx+8, H*0.18);
      ctx.closePath(); ctx.fill();
    }

    // 地面
    const gd = ctx.createLinearGradient(0, this.groundY, 0, H);
    gd.addColorStop(0, '#5a2a18'); gd.addColorStop(1, '#2a0a05');
    ctx.fillStyle = gd;
    ctx.fillRect(0, this.groundY, W, H - this.groundY);
    // 石頭裝飾
    ctx.fillStyle = '#3a1810';
    ctx.fillRect(40, this.groundY+15, 18, 8);
    ctx.fillRect(180, this.groundY+22, 12, 6);

    // 🚪 大門
    this.drawDoor(ctx);

    // 🔥 火焰封印
    if (this.fireIntensity > 0.01) this.drawFire(ctx);

    // 蒸氣（水失敗）
    if (this.steamAlpha > 0) {
      for (let i = 0; i < 8; i++) {
        const sx = this.fireX + Math.sin(this.time*2+i) * 20;
        const sy = this.groundY - 30 - i * 15 - this.time * 30 % 100;
        const sa = this.steamAlpha * (1 - i/8) * 0.6;
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 25);
        grad.addColorStop(0, `rgba(255,255,255,${sa})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(sx-25, sy-25, 50, 50);
      }
    }

    // 虎紋貓
    if (this.cat) this.cat.draw(ctx);

    // 火星
    for (const e of this.emberParticles) {
      const a = (1 - e.life) * 0.6;
      ctx.fillStyle = `rgba(255, ${100+e.life*100}, 30, ${a})`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }

    // 慶祝粒子
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;

    // 道具列
    this.drawItems(ctx);

    // 標題
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 130, 16, 260, 36);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(`🔥 火之大陸 — 第 2 關`, W/2, 40);

    // 步驟指示器
    if (!this.cleared && !this.catWalking) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(W/2 - 90, 56, 180, 22);
      ctx.fillStyle = this.puzzleStep === 1 ? '#ff7043' : '#81c784';
      ctx.font = 'bold 13px -apple-system, "PingFang TC"';
      const stepText = this.puzzleStep === 1 ? '步驟 1/2：火太強，先讓火變弱' : '步驟 2/2：火變弱了，把它弄熄';
      ctx.fillText(stepText, W/2, 71);
    }

    // 返回鈕
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';

    // 提示文字
    if (this.feedbackText) {
      const a = Math.min(1, this.feedbackTimer / 0.4);
      ctx.save(); ctx.globalAlpha = a;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(W/2 - 220, 90, 440, 36);
      ctx.fillStyle = this.feedbackColor;
      ctx.font = 'bold 15px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText(this.feedbackText, W/2, 113);
      ctx.restore();
    }

    if (this.showHintCard) this.drawHintCard(ctx);
    if (this.showWinCard) this.drawWinCard(ctx);

    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  drawDoor(ctx) {
    const W = Game.width;
    const dx = this.doorX;
    const dy = this.groundY;
    const dw = 60, dh = 100;

    // 門框
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(dx - dw/2 - 4, dy - dh - 4, dw + 8, dh + 4);
    // 門
    if (this.doorOpening < 0.99) {
      const openOffset = this.doorOpening * dw * 0.4;
      // 左半門
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(dx - dw/2, dy - dh, dw/2 - openOffset, dh);
      ctx.fillRect(dx + openOffset, dy - dh, dw/2 - openOffset, dh);
      // 門紋
      ctx.strokeStyle = '#3a2010';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dx - dw/2, dy - dh*0.5);
      ctx.lineTo(dx - openOffset, dy - dh*0.5);
      ctx.moveTo(dx + openOffset, dy - dh*0.5);
      ctx.lineTo(dx + dw/2, dy - dh*0.5);
      ctx.stroke();
      // 門把
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(dx - openOffset - 6, dy - dh/2, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx + openOffset + 6, dy - dh/2, 3, 0, Math.PI*2); ctx.fill();
    }
    // 門內光（開門後才看到）
    if (this.doorOpening > 0.1) {
      const innerW = dw * this.doorOpening * 0.8;
      const grad = ctx.createLinearGradient(dx, dy-dh, dx, dy);
      grad.addColorStop(0, `rgba(255,235,150,${this.doorOpening * 0.8})`);
      grad.addColorStop(1, `rgba(255,180,80,${this.doorOpening * 0.6})`);
      ctx.fillStyle = grad;
      ctx.fillRect(dx - innerW/2, dy - dh + 5, innerW, dh - 5);
    }
  }

  drawFire(ctx) {
    const fx = this.fireX;
    const fy = this.groundY;
    const intensity = Math.min(1, this.fireIntensity + this.flameFlash * 0.6);
    const flameH = 90 * intensity;
    const flameW = 50 * Math.max(0.5, intensity);

    // 火焰光暈
    const glow = ctx.createRadialGradient(fx, fy - flameH*0.3, 0, fx, fy - flameH*0.3, 80 * intensity);
    glow.addColorStop(0, `rgba(255, 150, 50, ${0.4 * intensity})`);
    glow.addColorStop(1, 'rgba(255, 150, 50, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(fx - 80, fy - flameH - 20, 160, flameH + 40);

    // 火焰本體（多層）
    const layers = [
      { color: 'rgba(244, 67, 54, 0.85)', wScale: 1.0, hScale: 1.0 },
      { color: 'rgba(255, 152, 0, 0.85)', wScale: 0.75, hScale: 0.85 },
      { color: 'rgba(255, 235, 59, 0.85)', wScale: 0.45, hScale: 0.65 },
    ];
    for (const layer of layers) {
      const fw = flameW * layer.wScale;
      const fh = flameH * layer.hScale;
      ctx.fillStyle = layer.color;
      ctx.beginPath();
      const points = 12;
      for (let i = 0; i <= points; i++) {
        const t = i / points;
        const ang = Math.PI + Math.PI * t;
        const wave = Math.sin(this.time * 8 + i * 0.8) * 4 * intensity;
        const px = fx + Math.cos(ang) * fw + wave;
        const py = fy + Math.sin(ang) * fh - fh * 0.3 - Math.abs(Math.sin(ang)) * 5;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.lineTo(fx + fw*0.6, fy);
      ctx.lineTo(fx - fw*0.6, fy);
      ctx.closePath(); ctx.fill();
    }
    // 封印符號（火上方）
    if (intensity > 0.3) {
      ctx.save();
      ctx.translate(fx, fy - flameH - 10);
      ctx.rotate(this.time * 0.5);
      ctx.fillStyle = `rgba(255, 215, 0, ${intensity * 0.7})`;
      for (let i = 0; i < 6; i++) {
        ctx.rotate(Math.PI / 3);
        ctx.fillRect(-2, -15, 4, 10);
      }
      ctx.restore();
    }
  }

  drawItems(ctx) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, H-110, W, 110);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(0, H-110, W, 1);

    for (const it of this.items) {
      const wobble = it.used ? 0 : Math.sin(this.time*2 + it.x*0.01) * 2;
      ctx.fillStyle = it.used ? 'rgba(50,50,50,0.4)' : 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.arc(it.x, it.y + wobble, it.r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = it.used ? 'rgba(100,100,100,0.3)' : 'rgba(255,215,0,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = '32px -apple-system';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = it.used ? 0.3 : 1;
      ctx.fillText(it.icon, it.x, it.y + wobble);
      ctx.globalAlpha = 1;
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = it.used ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.85)';
      ctx.font = '12px -apple-system, "PingFang TC"';
      ctx.fillText(it.name, it.x, it.y + it.r + 16 + wobble);
    }
  }

  drawHintCard(ctx) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    const cardW = Math.min(440, W - 40);
    const cardH = 320;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;
    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#1a3a5a'); grad.addColorStop(1, '#0a1a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('💡 火為什麼會熄滅？', W/2, cy + 40);
    ctx.fillStyle = '#fff';
    ctx.font = '15px -apple-system, "PingFang TC"';
    const lines = [
      '火要燒起來需要 3 樣東西：',
      '🔥 可燃物（樹枝、紙）',
      '💨 氧氣（風裡的氣體）',
      '🌡️ 高溫',
      '',
      '只要拿掉一樣，火就會熄滅！',
      '',
      '❄️ 冰塊 → 拿走「高溫」',
      '🌬️ 風箱 → 吹散讓火接觸不到「氧氣」',
      '',
      '✨ 這就是消防員的滅火原理 🚒',
    ];
    lines.forEach((line, i) => {
      ctx.fillStyle = (i === 0 || i === 5 || i === 10) ? '#ffd700' : '#fff';
      ctx.fillText(line, W/2, cy + 75 + i*20);
    });
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px -apple-system, "PingFang TC"';
    ctx.fillText('（點任意處繼續）', W/2, cy + cardH - 20);
  }

  drawWinCard(ctx) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    const cardW = Math.min(360, W - 40);
    const cardH = 220;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;
    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#3a1a5a'); grad.addColorStop(1, '#1a0a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();
    const bounce = Math.abs(Math.sin(this.time*4)) * 6;
    ctx.font = '52px -apple-system';
    ctx.textAlign = 'center';
    ctx.fillText('🎊', W/2, cy + 70 - bounce);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 24px -apple-system, "PingFang TC"';
    ctx.fillText('解開封印！', W/2, cy + 110);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '14px -apple-system, "PingFang TC"';
    ctx.fillText('🚪 大門打開了！', W/2, cy + 140);
    ctx.fillText('💪 兩步驟解謎難不倒你', W/2, cy + 162);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px -apple-system, "PingFang TC"';
    ctx.fillText('（點任意處回到火之大陸地圖）', W/2, cy + cardH - 20);
  }
}

/* ============================================================
   🔥 通用工具：火之大陸關卡共用基底（簡化版）
   ============================================================ */
class FireLevelBase {
  constructor(levelNum) {
    this.name = `Fire L${levelNum}`;
    this.levelNum = levelNum;
    this.continent = 'fire';      // ← 子類別 super 後可改成 water/forest/ice
    this.mapSceneClass = null;    // ← 子類別可指定回去哪個地圖
    this.time = 0;
    this.cat = null;
    this.smokeParticles = [];
    this.emberParticles = [];
    this.successParticles = [];
    this.cleared = false;
    this.catWalking = false;
    this.catWalkTween = null;
    this.feedbackText = null;
    this.feedbackTimer = 0;
    this.feedbackColor = '#fff';
    this.showHintCard = false;
    this.showWinCard = false;
    this.enterAlpha = 1;
    this.enterTween = new Tween(1, 0, 0.6, Easing.easeOutCubic);
    this.backBtn = { x: 50, y: 30, r: 22 };
  }
  enter() {
    this.layout();
    this.cat = new PixelCat(this.catStartX, this.groundY);
    this.cat.scale = 3;
    for (let i = 0; i < 15; i++) {
      this.smokeParticles.push({
        x: Math.random()*Game.width, y: Math.random()*Game.height*0.4,
        size: 30+Math.random()*40, speed: 10+Math.random()*15,
        alpha: 0.05+Math.random()*0.08,
      });
    }
    for (let i = 0; i < 25; i++) {
      this.emberParticles.push({
        x: Math.random()*Game.width, y: Game.height + Math.random()*100,
        vy: -30-Math.random()*40, life: Math.random(), size: 1+Math.random()*2,
      });
    }
    if (this.onEnter) this.onEnter();
  }
  baseLayout() {
    const W = Game.width, H = Game.height;
    this.groundY = H * 0.7;
    this.catStartX = W * 0.18;
    this.catTargetX = W * 0.82;
  }
  showFeedback(text, color) {
    this.feedbackText = text; this.feedbackColor = color || '#fff'; this.feedbackTimer = 2.5;
  }
  startWalk(targetX, onArrive) {
    this.catWalking = true;
    this.cat.setState('walk');
    this.catWalkTween = new Tween(this.catStartX, targetX || this.catTargetX, 2.0, Easing.easeInOutCubic, () => {
      this.cat.setState('cheer');
      this.cleared = true;
      this.catWalking = false;
      Game.progress[this.continent + 'Level'] = Math.max(Game.progress[this.continent + 'Level'] || 0, this.levelNum);
      Game.progress[this.continent] = (Game.progress[this.continent + 'Level'] >= 6);
      Game.saveProgress();
      this.spawnSuccessParticles();
      if (onArrive) onArrive();
      setTimeout(() => {
        if (Game.parentMode) this.showHintCard = true;
        else this.showWinCard = true;
      }, 1200);
    });
  }
  spawnSuccessParticles() {
    for (let i = 0; i < 50; i++) {
      this.successParticles.push({
        x: this.cat.x, y: this.cat.y - 60,
        vx: (Math.random()-0.5) * 240,
        vy: -120 - Math.random()*180,
        life: 0, maxLife: 1.4 + Math.random()*0.6,
        color: ['#ffd700','#ffeb3b','#ff5252','#4fc3f7','#fff','#81c784'][Math.floor(Math.random()*6)],
        size: 2 + Math.random()*2,
      });
    }
  }
  baseUpdate(dt) {
    this.time += dt;
    this.enterAlpha = this.enterTween.update(dt);
    if (this.cat) this.cat.update(dt);
    if (this.catWalkTween && !this.catWalkTween.done) this.cat.x = this.catWalkTween.update(dt);
    for (const s of this.smokeParticles) {
      s.x += s.speed * dt; s.y -= s.speed * dt * 0.5;
      if (s.y < -50 || s.x > Game.width+100) { s.x = -50; s.y = Game.height*0.5 + Math.random()*100; }
    }
    for (const e of this.emberParticles) {
      e.life += dt * 0.5; e.y += e.vy * dt;
      if (e.life > 1 || e.y < 0) { e.life = 0; e.x = Math.random() * Game.width; e.y = Game.height + 20; }
    }
    for (const p of this.successParticles) {
      p.life += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt;
    }
    this.successParticles = this.successParticles.filter(p => p.life < p.maxLife);
    if (this.feedbackTimer > 0) {
      this.feedbackTimer -= dt;
      if (this.feedbackTimer <= 0) this.feedbackText = null;
    }
  }
  drawBackground(ctx) {
    const W = Game.width, H = Game.height;
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#1a0a05'); sky.addColorStop(0.4, '#5a1810');
    sky.addColorStop(0.7, '#a02810'); sky.addColorStop(1, '#3a0a05');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
    for (const s of this.smokeParticles) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      g.addColorStop(0, `rgba(60,30,20,${s.alpha})`); g.addColorStop(1, 'rgba(60,30,20,0)');
      ctx.fillStyle = g;
      ctx.fillRect(s.x-s.size, s.y-s.size, s.size*2, s.size*2);
    }
    // 遠山
    ctx.fillStyle = '#2a0a05';
    ctx.beginPath();
    ctx.moveTo(0, H*0.55); ctx.lineTo(W*0.15, H*0.4); ctx.lineTo(W*0.3, H*0.5);
    ctx.lineTo(W*0.5, H*0.35); ctx.lineTo(W*0.7, H*0.45);
    ctx.lineTo(W*0.85, H*0.38); ctx.lineTo(W, H*0.5);
    ctx.lineTo(W, H*0.7); ctx.lineTo(0, H*0.7);
    ctx.closePath(); ctx.fill();
    // 地面
    const gd = ctx.createLinearGradient(0, this.groundY, 0, H);
    gd.addColorStop(0, '#5a2a18'); gd.addColorStop(1, '#2a0a05');
    ctx.fillStyle = gd;
    ctx.fillRect(0, this.groundY, W, H - this.groundY);
  }
  drawForeground(ctx) {
    const W = Game.width, H = Game.height;
    // 火星
    for (const e of this.emberParticles) {
      const a = (1 - e.life) * 0.6;
      ctx.fillStyle = `rgba(255, ${100+e.life*100}, 30, ${a})`;
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }
    // 慶祝粒子
    for (const p of this.successParticles) {
      const a = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color; ctx.globalAlpha = a;
      ctx.fillRect(p.x, p.y, p.size*2, p.size*2);
    }
    ctx.globalAlpha = 1;
  }
  drawHeader(ctx, title, hint) {
    const W = Game.width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W/2 - 130, 16, 260, 36);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(title, W/2, 40);
    if (hint && !this.cleared && !this.catWalking) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(W/2 - 180, 56, 360, 22);
      ctx.fillStyle = '#ffe082';
      ctx.font = 'bold 13px -apple-system, "PingFang TC"';
      ctx.fillText(hint, W/2, 71);
    }
  }
  drawBackBtn(ctx) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.arc(this.backBtn.x, this.backBtn.y, this.backBtn.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px -apple-system';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('←', this.backBtn.x, this.backBtn.y);
    ctx.textBaseline = 'alphabetic';
  }
  drawFeedback(ctx) {
    if (!this.feedbackText) return;
    const W = Game.width;
    const a = Math.min(1, this.feedbackTimer / 0.4);
    ctx.save(); ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2 - 220, 90, 440, 36);
    ctx.fillStyle = this.feedbackColor;
    ctx.font = 'bold 15px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(this.feedbackText, W/2, 113);
    ctx.restore();
  }
  drawWinCard(ctx, msg) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    const cardW = Math.min(360, W - 40), cardH = 220;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;
    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#3a1a5a'); grad.addColorStop(1, '#1a0a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();
    const bounce = Math.abs(Math.sin(this.time*4)) * 6;
    ctx.font = '52px -apple-system'; ctx.textAlign = 'center';
    ctx.fillText('🎉', W/2, cy + 70 - bounce);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 24px -apple-system, "PingFang TC"';
    ctx.fillText(msg || '過關了！', W/2, cy + 110);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '14px -apple-system, "PingFang TC"';
    ctx.fillText(`第 ${this.levelNum} 關完成 ✨`, W/2, cy + 140);
    // 大顆按鈕（更明顯）
    const btnW = 180, btnH = 38;
    const btnX = (W - btnW) / 2, btnY = cy + cardH - 56;
    const pulseAlpha = 0.7 + Math.sin(this.time*3)*0.3;
    ctx.fillStyle = `rgba(255, 215, 0, ${pulseAlpha})`;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(btnX, btnY, btnW, btnH, 19);
    else ctx.rect(btnX, btnY, btnW, btnH);
    ctx.fill();
    ctx.fillStyle = '#1a0a3a';
    ctx.font = 'bold 14px -apple-system, "PingFang TC"';
    ctx.textBaseline = 'middle';
    ctx.fillText('👆 點任意處回地圖', W/2, btnY + btnH/2);
    ctx.textBaseline = 'alphabetic';
  }
  drawHintCard(ctx, title, lines) {
    const W = Game.width, H = Game.height;
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    const cardW = Math.min(440, W - 40);
    const cardH = 90 + lines.length * 22;
    const cx = (W-cardW)/2, cy = (H-cardH)/2;
    const grad = ctx.createLinearGradient(0, cy, 0, cy+cardH);
    grad.addColorStop(0, '#1a3a5a'); grad.addColorStop(1, '#0a1a3a');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 3;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, cy, cardW, cardH, 20);
    else ctx.rect(cx, cy, cardW, cardH);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 22px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText(title, W/2, cy + 40);
    ctx.font = '15px -apple-system, "PingFang TC"';
    lines.forEach((line, i) => {
      ctx.fillStyle = line.startsWith('✨') || line.startsWith('💡') ? '#ffd700' : '#fff';
      ctx.fillText(line, W/2, cy + 75 + i*22);
    });
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px -apple-system, "PingFang TC"';
    ctx.fillText('（點任意處繼續）', W/2, cy + cardH - 20);
  }
  drawEnterFade(ctx) {
    if (this.enterAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this.enterAlpha})`;
      ctx.fillRect(0, 0, Game.width, Game.height);
    }
  }
  baseTap(x, y) {
    const dx = x - this.backBtn.x, dy = y - this.backBtn.y;
    const MapClass = this.mapSceneClass || FireMapScene;
    if (dx*dx + dy*dy < this.backBtn.r * this.backBtn.r) {
      Game.changeScene(new MapClass()); return 'back';
    }
    if (this.showWinCard) { Game.changeScene(new MapClass()); return 'back'; }
    if (this.showHintCard) { this.showHintCard = false; return 'closeHint'; }
    if (this.cleared || this.catWalking) return 'busy';
    return null;
  }
}

/* ============================================================
   🔥 第 3 關：火炬之路（規律辨識 — 按指定順序點亮 3 個火炬）
   ============================================================ */
class FireLevel3Scene extends FireLevelBase {
  constructor() {
    super(3);
    // 3 個火炬，玩家要按「中、左、右」順序點亮
    this.torches = [];
    this.correctOrder = [1, 0, 2]; // 中→左→右
    this.currentStep = 0;
    this.showHint = true;
  }
  onEnter() {
    const W = Game.width;
    const positions = [W*0.32, W*0.5, W*0.68];
    this.torches = positions.map((px, i) => ({
