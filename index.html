      x: px, y: this.groundY, lit: false, litTime: 0, idx: i,
      flicker: Math.random() * Math.PI * 2,
    }));
  }
  layout() { this.baseLayout(); if (this.torches) {
    const W = Game.width;
    const positions = [W*0.32, W*0.5, W*0.68];
    this.torches.forEach((t, i) => { t.x = positions[i]; t.y = this.groundY; });
  }}
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    for (const t of this.torches) {
      if (t.lit) continue;
      const dx = x - t.x, dy = y - (t.y - 50);
      if (dx*dx + dy*dy < 50*50) {
        const expectedIdx = this.correctOrder[this.currentStep];
        if (t.idx === expectedIdx) {
          t.lit = true; t.litTime = this.time;
          this.currentStep++;
          this.showFeedback(`✨ 點對了！(${this.currentStep}/3)`, '#81c784');
          if (this.currentStep >= 3) {
            setTimeout(() => this.startWalk(), 800);
          }
        } else {
          // 答錯：所有火炬熄滅，重來
          this.showFeedback('❌ 順序錯了！全部熄滅，再從頭來', '#ff7043');
          for (const tt of this.torches) tt.lit = false;
          this.currentStep = 0;
        }
        return;
      }
    }
  }
  update(dt) { this.baseUpdate(dt); }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 規律提示牆（左上方告示牌 — 用圖示讓孩子自己推理）
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2 - 150, H*0.20, 300, 90);
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
    ctx.strokeRect(W/2 - 150, H*0.20, 300, 90);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('🪧 古老石碑', W/2, H*0.20 + 22);
    // 三個圈圈代表火炬位置，亮的是 idx 1（中）、0（左）、2（右）
    // 但用「順序符號 1️⃣ 2️⃣ 3️⃣」放在火炬位置上面讓孩子推理
    ctx.fillStyle = '#fff';
    ctx.font = '13px -apple-system, "PingFang TC"';
    ctx.fillText('找出正確的點亮順序', W/2, H*0.20 + 42);
    // 三個位置示意（左 中 右）
    const cx = W/2;
    const cy = H*0.20 + 70;
    const positions = [-50, 0, 50];
    const orderSymbols = ['②', '①', '③']; // 左=2, 中=1, 右=3
    for (let i = 0; i < 3; i++) {
      // 圓圈
      ctx.fillStyle = '#3a2010';
      ctx.beginPath(); ctx.arc(cx + positions[i], cy, 13, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
      ctx.stroke();
      // 順序數字
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 16px -apple-system, "PingFang TC"';
      ctx.textBaseline = 'middle';
      ctx.fillText(orderSymbols[i], cx + positions[i], cy);
      ctx.textBaseline = 'alphabetic';
    }

    // 火炬
    for (let i = 0; i < this.torches.length; i++) {
      const t = this.torches[i];
      // 桿
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(t.x - 4, t.y - 60, 8, 60);
      // 火盆
      ctx.fillStyle = '#3a2010';
      ctx.beginPath();
      ctx.ellipse(t.x, t.y - 55, 14, 6, 0, 0, Math.PI*2); ctx.fill();
      // 火焰（如果點亮）
      if (t.lit) {
        const intensity = Math.min(1, (this.time - t.litTime) * 3);
        const flameH = 50 * intensity;
        for (let k = 0; k < 3; k++) {
          const layerColors = ['rgba(244,67,54,0.85)', 'rgba(255,152,0,0.85)', 'rgba(255,235,59,0.85)'];
          const wScale = [1.0, 0.7, 0.4][k];
          const hScale = [1.0, 0.85, 0.65][k];
          ctx.fillStyle = layerColors[k];
          ctx.beginPath();
          const fw = 14 * wScale, fh = flameH * hScale;
          ctx.moveTo(t.x - fw, t.y - 55);
          for (let p = 0; p <= 8; p++) {
            const px = t.x - fw + (fw*2) * (p/8);
            const py = t.y - 55 - fh * Math.sin(Math.PI * p/8) + Math.sin(this.time*8 + p + i) * 2;
            ctx.lineTo(px, py);
          }
          ctx.lineTo(t.x + fw, t.y - 55);
          ctx.closePath(); ctx.fill();
        }
        // 光暈
        const glow = ctx.createRadialGradient(t.x, t.y - 70, 0, t.x, t.y - 70, 60);
        glow.addColorStop(0, 'rgba(255,200,80,0.4)'); glow.addColorStop(1, 'rgba(255,200,80,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(t.x - 60, t.y - 130, 120, 120);
      } else {
        // 未點亮：顯示淡淡微光（不指示順序，讓玩家自己思考）
        ctx.fillStyle = `rgba(255, 200, 80, 0.15)`;
        ctx.beginPath(); ctx.arc(t.x, t.y - 55, 18, 0, Math.PI*2); ctx.fill();
      }
      // 編號
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = 'bold 12px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText(['左','中','右'][i], t.x, t.y + 18);
    }

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);
    this.drawHeader(ctx, '🔥 火之大陸 — 第 3 關 火炬之路', `按順序點亮火炬！(${this.currentStep}/3)`);
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 規律與順序', [
        '世界上很多事情都有「順序」：',
        '🚪 先開門才能走出去',
        '🍳 先打蛋才能煎蛋',
        '👕 先穿內衣才穿外衣',
        '',
        '✨ 學會看「規律」找順序',
        '是很重要的邏輯思考能力！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx);
    this.drawEnterFade(ctx);
  }
}

/* ============================================================
   🔥 第 4 關：火龍蛋（條件平衡 — 加溫剛剛好才孵化）
   ============================================================ */
class FireLevel4Scene extends FireLevelBase {
  constructor() {
    super(4);
    this.eggHeat = 30;             // 溫度 0~100
    this.targetMin = 50;
    this.targetMax = 70;
    this.heating = false;
    this.cooling = false;
    this.hatched = false;
    this.babyDragon = null;        // 出生的小火龍位置
    this.crackLevel = 0;           // 蛋的裂痕程度
    this.wrongTimer = 0;           // 過熱/過冷警示
  }
  layout() {
    this.baseLayout();
    const W = Game.width;
    this.eggX = W * 0.5;
    this.eggY = this.groundY - 30;
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    if (this.hatched) return;
    const W = Game.width, H = Game.height;
    // 兩個按鈕
    const btnY = H - 80;
    const btnHeat = { x: W*0.35, y: btnY, r: 42 };
    const btnCool = { x: W*0.65, y: btnY, r: 42 };
    const dh = x - btnHeat.x, dh2 = y - btnHeat.y;
    const dc = x - btnCool.x, dc2 = y - btnCool.y;
    if (dh*dh + dh2*dh2 < btnHeat.r*btnHeat.r) { this.heating = true; this.cooling = false; }
    else if (dc*dc + dc2*dc2 < btnCool.r*btnCool.r) { this.cooling = true; this.heating = false; }
    else { this.heating = false; this.cooling = false; }
  }
  update(dt) {
    this.baseUpdate(dt);
    // 小龍時間要持續累加（即使已孵化）
    if (this.babyDragon) this.babyDragon.time += dt;
    if (this.hatched) return;
    if (this.heating) this.eggHeat = Math.min(100, this.eggHeat + 25 * dt);
    else if (this.cooling) this.eggHeat = Math.max(0, this.eggHeat - 25 * dt);
    else this.eggHeat += (40 - this.eggHeat) * dt * 0.3; // 自然趨近 40

    // 在目標區停留 → 累積裂痕
    if (this.eggHeat >= this.targetMin && this.eggHeat <= this.targetMax) {
      this.crackLevel += dt * 30;
      this.wrongTimer = 0;
      if (this.crackLevel >= 100 && !this.hatched) {
        this.hatched = true;
        this.babyDragon = { x: this.eggX, y: this.eggY, time: 0 };
        this.showFeedback('🐉 火龍蛋孵化了！', '#ffd700');
        setTimeout(() => this.startWalk(), 1800);
      }
    } else {
      // 偏離目標太久警示
      this.wrongTimer += dt;
      this.crackLevel = Math.max(0, this.crackLevel - dt * 15);
      if (this.eggHeat > 90 && this.wrongTimer > 0.4) {
        this.wrongTimer = 0;
        this.showFeedback('🥵 太燙了！蛋會被燒焦', '#ff5252');
      } else if (this.eggHeat < 20 && this.wrongTimer > 0.4) {
        this.wrongTimer = 0;
        this.showFeedback('🥶 太冷了！蛋孵不出來', '#4fc3f7');
      }
    }
  }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 蛋的台座
    ctx.fillStyle = '#3a2010';
    ctx.beginPath();
    ctx.ellipse(this.eggX, this.eggY + 25, 50, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(this.eggX - 35, this.eggY + 18, 70, 14);

    // 蛋
    if (!this.hatched) {
      const wobble = Math.sin(this.time*8) * (this.crackLevel/100) * 2;
      // 蛋身（紅色花紋）
      const eggGrad = ctx.createRadialGradient(this.eggX-8, this.eggY-15, 0, this.eggX, this.eggY, 35);
      eggGrad.addColorStop(0, '#ffcdd2'); eggGrad.addColorStop(1, '#c62828');
      ctx.fillStyle = eggGrad;
      ctx.beginPath();
      ctx.ellipse(this.eggX + wobble, this.eggY, 28, 36, 0, 0, Math.PI*2);
      ctx.fill();
      // 紅色花紋
      ctx.fillStyle = '#7f0000';
      ctx.beginPath(); ctx.ellipse(this.eggX-10+wobble, this.eggY-5, 4, 7, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(this.eggX+8+wobble, this.eggY+8, 5, 8, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(this.eggX-3+wobble, this.eggY+15, 3, 5, 0, 0, Math.PI*2); ctx.fill();
      // 裂痕
      if (this.crackLevel > 30) {
        ctx.strokeStyle = '#3a0a05'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.eggX-8+wobble, this.eggY-20);
        ctx.lineTo(this.eggX-2+wobble, this.eggY-10);
        ctx.lineTo(this.eggX+5+wobble, this.eggY);
        if (this.crackLevel > 60) {
          ctx.lineTo(this.eggX-3+wobble, this.eggY+12);
          ctx.lineTo(this.eggX+7+wobble, this.eggY+22);
        }
        ctx.stroke();
      }
      // 過熱/過冷 視覺回饋
      if (this.eggHeat > 90) {
        ctx.fillStyle = `rgba(255,87,34,${0.3+Math.sin(this.time*8)*0.2})`;
        ctx.beginPath(); ctx.arc(this.eggX, this.eggY, 50, 0, Math.PI*2); ctx.fill();
      } else if (this.eggHeat < 20) {
        ctx.fillStyle = `rgba(100,200,255,${0.3+Math.sin(this.time*4)*0.15})`;
        ctx.beginPath(); ctx.arc(this.eggX, this.eggY, 50, 0, Math.PI*2); ctx.fill();
      }
    } else {
      // 小火龍出生！
      const t = this.babyDragon.time;
      const popY = this.eggY - Math.min(t * 30, 30);
      const scale = Math.min(t * 1.5, 1);
      ctx.save();
      ctx.translate(this.babyDragon.x, popY);
      ctx.scale(scale, scale);
      // 龍身
      ctx.fillStyle = '#e53935';
      ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
      // 翅膀
      ctx.fillStyle = '#ff7043';
      ctx.beginPath(); ctx.ellipse(-15, -5, 10, 6, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(15, -5, 10, 6, 0.3, 0, Math.PI*2); ctx.fill();
      // 眼睛
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-6, -3, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -3, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-6, -3, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -3, 1.5, 0, Math.PI*2); ctx.fill();
      // 口
      ctx.fillStyle = '#7f0000';
      ctx.beginPath(); ctx.arc(0, 5, 4, 0, Math.PI); ctx.fill();
      // 角
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(-5, -15); ctx.lineTo(-3, -22); ctx.lineTo(-1, -15);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(5, -15); ctx.lineTo(3, -22); ctx.lineTo(1, -15);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // 溫度計
    const tcX = W * 0.85;
    const tcY = H * 0.5;
    const tcH = 200;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(tcX - 18, tcY - tcH/2, 36, tcH);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(tcX - 18, tcY - tcH/2, 36, tcH);
    // 目標區（綠色）
    const minY = tcY + tcH/2 - tcH * (this.targetMin/100);
    const maxY = tcY + tcH/2 - tcH * (this.targetMax/100);
    ctx.fillStyle = 'rgba(76, 175, 80, 0.4)';
    ctx.fillRect(tcX - 18, maxY, 36, minY - maxY);
    // 目前溫度條
    const heatY = tcY + tcH/2 - tcH * (this.eggHeat/100);
    let heatColor = '#ffd700';
    if (this.eggHeat > 90) heatColor = '#ff5252';
    else if (this.eggHeat < 20) heatColor = '#4fc3f7';
    else if (this.eggHeat >= this.targetMin && this.eggHeat <= this.targetMax) heatColor = '#4caf50';
    ctx.fillStyle = heatColor;
    ctx.fillRect(tcX - 14, heatY, 28, tcY + tcH/2 - heatY);
    // 標籤
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px -apple-system, "PingFang TC"';
    ctx.textAlign = 'center';
    ctx.fillText('🔥 熱', tcX, tcY - tcH/2 - 8);
    ctx.fillText('❄️ 冷', tcX, tcY + tcH/2 + 18);
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 10px -apple-system';
    ctx.fillText('剛好', tcX + 28, (minY + maxY)/2 + 4);
    // 溫度數字
    ctx.fillStyle = heatColor;
    ctx.font = 'bold 14px -apple-system';
    ctx.fillText(`${Math.floor(this.eggHeat)}°`, tcX, heatY - 6);

    // 進度條（孵化）
    if (!this.hatched && this.crackLevel > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(W/2 - 80, H*0.22, 160, 14);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(W/2 - 80, H*0.22, 160 * (this.crackLevel/100), 14);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(W/2 - 80, H*0.22, 160, 14);
      ctx.fillStyle = '#fff';
      ctx.font = '11px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center';
      ctx.fillText('孵化進度', W/2, H*0.22 - 4);
    }

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);

    // 控制按鈕
    const btnY = H - 80;
    [
      { x: W*0.35, label: '🔥 加熱', color: '#ff5722', active: this.heating },
      { x: W*0.65, label: '❄️ 降溫', color: '#03a9f4', active: this.cooling },
    ].forEach(btn => {
      ctx.fillStyle = btn.active ? btn.color : 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(btn.x, btnY, 42, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = btn.color; ctx.lineWidth = 3;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px -apple-system, "PingFang TC"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(btn.label, btn.x, btnY);
      ctx.textBaseline = 'alphabetic';
    });

    this.drawHeader(ctx, '🔥 火之大陸 — 第 4 關 火龍蛋', '溫度太高會燒焦，太低孵不出來，找剛剛好的點！');
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 過猶不及', [
        '世界上很多事情都要「剛剛好」：',
        '🍜 麵不能太硬也不能太爛',
        '🌱 植物澆水不能太多也不能太少',
        '😴 睡覺不能太少也不能太多',
        '',
        '✨ 找到「剛剛好」的平衡點',
        '是很重要的判斷力！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '蛋孵化了！');
    this.drawEnterFade(ctx);
  }
}

/* ============================================================
   🔥 第 5 關：鎖鏈火球（連鎖反應 — 預測哪個火球會引爆全部）
   ============================================================ */
class FireLevel5Scene extends FireLevelBase {
  constructor() {
    super(5);
    // 5 個火球。編號刻意打亂，玩家必須看箭頭才能找出正解
    // 位置 idx: 0  1  2  3  4
    // 顯示編號:  3  1  4  2  5
    // 連鎖路徑（label 視角）：3 → 2 → 1 → 5；3 → 4 → 5
    // 只有點「3」才能炸光全部
    this.fireballs = [];
    this.labels = [3, 1, 4, 2, 5];   // idx → 顯示編號
    this.connections = [
      [3, 2],   // idx 0 (label 3) → idx 3 (label 2), idx 2 (label 4)
      [4],      // idx 1 (label 1) → idx 4 (label 5)
      [4],      // idx 2 (label 4) → idx 4 (label 5)
      [1],      // idx 3 (label 2) → idx 1 (label 1)
      [],       // idx 4 (label 5) → 無
    ];
    this.exploded = new Set();
    this.tapped = false;
  }
  layout() {
    this.baseLayout();
    const W = Game.width, H = Game.height;
    // 5 個火球，在洞穴頂部
    const ys = [H*0.32, H*0.42, H*0.30, H*0.45, H*0.34];
    const xs = [W*0.2, W*0.32, W*0.46, W*0.62, W*0.78];
    if (this.fireballs.length === 0) {
      for (let i = 0; i < 5; i++) {
        this.fireballs.push({ x: xs[i], y: ys[i], idx: i, exploding: false, explodeTime: 0 });
      }
    } else {
      this.fireballs.forEach((f, i) => { f.x = xs[i]; f.y = ys[i]; });
    }
  }
  onResize() { this.layout(); if (this.cat) { this.cat.x = this.catStartX; this.cat.y = this.groundY; } }
  onTap(x, y) {
    if (this.baseTap(x, y) !== null) return;
    if (this.tapped) return;
    for (const f of this.fireballs) {
      const dx = x - f.x, dy = y - f.y;
      if (dx*dx + dy*dy < 32*32) {
        this.tapped = true;
        this.triggerChain(f.idx);
        return;
      }
    }
  }
  triggerChain(idx) {
    // 引爆 idx，再連鎖
    const explode = (i, delay) => {
      setTimeout(() => {
        const fb = this.fireballs[i];
        fb.exploding = true; fb.explodeTime = this.time;
        this.exploded.add(i);
        // 連鎖
        for (const next of this.connections[i]) {
          if (!this.exploded.has(next)) explode(next, 350);
        }
      }, delay);
    };
    explode(idx, 0);
    // 1.5 秒後檢查
    setTimeout(() => {
      if (this.exploded.size === 5) {
        this.showFeedback('🎆 全部炸光！', '#ffd700');
        setTimeout(() => this.startWalk(), 600);
      } else {
        this.showFeedback(`💣 只炸到 ${this.exploded.size} 個！再試試別的順序`, '#ff7043');
        setTimeout(() => {
          // 重置
          this.fireballs.forEach(f => { f.exploding = false; });
          this.exploded.clear();
          this.tapped = false;
        }, 1500);
      }
    }, 2500);
  }
  update(dt) { this.baseUpdate(dt); }
  draw(ctx) {
    const W = Game.width, H = Game.height;
    this.drawBackground(ctx);

    // 連線（鎖鏈）
    ctx.strokeStyle = 'rgba(255, 200, 100, 0.5)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    for (let i = 0; i < this.connections.length; i++) {
      const from = this.fireballs[i];
      for (const j of this.connections[i]) {
        const to = this.fireballs[j];
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
        // 箭頭
        const ang = Math.atan2(to.y - from.y, to.x - from.x);
        const mx = (from.x + to.x) / 2;
        const my = (from.y + to.y) / 2;
        ctx.fillStyle = 'rgba(255, 200, 100, 0.8)';
        ctx.beginPath();
        ctx.moveTo(mx + Math.cos(ang)*8, my + Math.sin(ang)*8);
        ctx.lineTo(mx + Math.cos(ang+2.5)*6, my + Math.sin(ang+2.5)*6);
        ctx.lineTo(mx + Math.cos(ang-2.5)*6, my + Math.sin(ang-2.5)*6);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.setLineDash([]);

    // 火球
    for (const f of this.fireballs) {
      if (f.exploding) {
        const t = this.time - f.explodeTime;
        const r = Math.min(t * 80, 50);
        const a = Math.max(0, 1 - t * 0.8);
        // 爆炸圈
        for (let k = 0; k < 3; k++) {
          ctx.fillStyle = `rgba(${[255,255,255][k]}, ${[150,200,235][k]}, ${[50,50,59][k]}, ${a*(0.8-k*0.2)})`;
          ctx.beginPath(); ctx.arc(f.x, f.y, Math.max(1, r - k*5), 0, Math.PI*2); ctx.fill();
        }
      } else {
        // 火球
        const pulse = 1 + Math.sin(this.time*4 + f.idx) * 0.08;
        const grad = ctx.createRadialGradient(f.x-5, f.y-5, 0, f.x, f.y, 28*pulse);
        grad.addColorStop(0, '#ffeb3b');
        grad.addColorStop(0.5, '#ff5722');
        grad.addColorStop(1, '#7f0000');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(f.x, f.y, 28*pulse, 0, Math.PI*2); ctx.fill();
        // 編號（用打亂後的 label，不是 idx）
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px -apple-system, "PingFang TC"';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`${this.labels[f.idx]}`, f.x, f.y);
        ctx.textBaseline = 'alphabetic';
      }
    }

    if (this.cat) this.cat.draw(ctx);
    this.drawForeground(ctx);
    this.drawHeader(ctx, '🔥 火之大陸 — 第 5 關 鎖鏈火球',
      '箭頭代表「會引爆」。點哪一顆能炸光全部？');
    this.drawBackBtn(ctx);
    this.drawFeedback(ctx);

    if (this.showHintCard) {
      this.drawHintCard(ctx, '💡 連鎖反應', [
        '一個動作會引發另一個動作',
        '這就是「連鎖反應」：',
        '🎳 推倒第一個保齡球瓶',
        '   會撞倒後面所有瓶子',
        '🦠 一個人感冒會傳染給很多人',
        '',
        '✨ 「想清楚再行動」',
        '是聰明人的習慣！',
      ]);
    }
    if (this.showWinCard) this.drawWinCard(ctx, '連鎖爆炸成功！');
    this.drawEnterFade(ctx);
  }
}

/* ============================================================
   🐲 第 6 關：烈焰魔王（三階段 BOSS 戰，整合所有技巧）
   ============================================================ */
class FireBossScene extends FireLevelBase {
  constructor() {
    super(6);
    this.boss = null;
    this.bossPhase = 1;            // 1, 2, 3
    this.bossHP = 3;
    this.bossMaxHP = 3;
    this.flashTime = 0;            // boss 受擊閃白
    this.bossDying = false;
    this.bossDieTime = 0;
    this.attackCooldown = 0;       // boss 出招冷卻
    this.fireballs = [];           // boss 噴出的火球（裝飾）
    this.phaseHint = '';
    this.phaseHintTimer = 0;

    // 階段道具
    // P1：因果（用水冷卻盾） - 4 道具選 1
    // P2：順序（先冰再風） - 2 步驟

      { id: 'wind',  icon: '🌬️', name: '風箱', x: 0, y: 0, used: false, correct: false },
      { id: 'water', icon: '💧', name: '水',   x: 0, y: 0, used: false, correct: true },
    ];
    this.p2Items = [
      { id: 'rock',  icon: '🪨', name: '石頭', x: 0, y: 0, used: false },
      { id: 'wind',  icon: '🌬️', name: '風箱', x: 0, y: 0, used: false },
      { id: 'water', icon: '💧', name: '水',   x: 0, y: 0, used: false },
      { id: 'ice',   icon: '❄️', name: '冰塊', x: 0, y: 0, used: false },
    ];
    this.p2Step = 1;
    // P3 用按鈕控制
